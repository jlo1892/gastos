<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gastos Pareja</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#f5f5f5;
}

#app{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* LOGIN */

.lhero{font-size:60px;text-align:center;}
.ltitle{font-size:28px;font-weight:600;text-align:center;margin-top:10px;}
.lsub{text-align:center;margin:8px 0 20px;color:#666;}

.lcards{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  justify-content:center;
}

.lc{
  background:#fff;
  border-radius:24px;
  padding:28px 32px;
  cursor:pointer;
  text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,.12);
  border:3px solid;
  transition:transform .15s;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}

.lc:active{
  transform:scale(.96);
}

.lc-e{font-size:36px;}
.lc-n{margin-top:8px;font-weight:600;}

.lhint{text-align:center;margin-top:20px;color:#888;}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

</head>
<body>

<div id="app"></div>

<script>

// 🔴 PEGA AQUI TU CONFIG DE FIREBASE
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_AUTH_DOMAIN",
  databaseURL: "TU_DATABASE_URL",
  projectId: "TU_PROJECT_ID",
  storageBucket: "TU_STORAGE_BUCKET",
  messagingSenderId: "TU_SENDER_ID",
  appId: "TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ESTADO

const COL = {
  manolo:"#4CAF50",
  esposa:"#E91E63"
};

let state = {
  usuario:null,
  perfiles:{
    manolo:{nombre:"Manolo",emoji:"👨"},
    esposa:{nombre:"Esposa",emoji:"👩"}
  }
};

// LOGIN

function renderLogin(){
  const p=state.perfiles;

  document.getElementById("app").innerHTML=`
    <div>
      <div class="lhero">💑</div>
      <div class="ltitle">Gastos Pareja</div>
      <div class="lsub">¿Quién va a registrar?</div>
      <div class="lcards">
        <div class="lc" id="pick-manolo" style="border-color:${COL.manolo}">
          <div class="lc-e">${p.manolo.emoji}</div>
          <div class="lc-n" style="color:${COL.manolo}">${p.manolo.nombre}</div>
        </div>
        <div class="lc" id="pick-esposa" style="border-color:${COL.esposa}">
          <div class="lc-e">${p.esposa.emoji}</div>
          <div class="lc-n" style="color:${COL.esposa}">${p.esposa.nombre}</div>
        </div>
      </div>
      <div class="lhint">📱 Datos sincronizados en tiempo real</div>
    </div>
  `;

  let lastPickAt=0;

  const pick=(k)=>{
    const now=Date.now();
    if(now-lastPickAt<300) return;
    lastPickAt=now;
    elegir(k);
  };

  const bind=(id,k)=>{
    const el=document.getElementById(id);
    if(!el) return;

    const go=(ev)=>{
      if(ev.cancelable) ev.preventDefault();
      pick(k);
    };

    el.addEventListener("pointerup",go,{passive:false});
    el.addEventListener("click",go);
  };

  bind("pick-manolo","manolo");
  bind("pick-esposa","esposa");
}

// SELECCIONAR USUARIO

function elegir(usuario){
  state.usuario = usuario;
  alert("Seleccionaste: " + state.perfiles[usuario].nombre);
  // aquí puedes llamar tu render principal
  // renderApp();
}

// INICIO
renderLogin();

</script>

</body>
</html>
