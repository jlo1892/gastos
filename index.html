<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Gastos Pareja 💑</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root{
      --c-manolo:#2563EB;--c-esposa:#DB2777;
      --user-color:#2563EB;--user-light:#EFF6FF;
      --c-bg:#F0F4FF;--c-text:#1e293b;--c-muted:#64748b;
      --c-border:#e2e8f0;--shadow:0 4px 20px rgba(0,0,0,.08);--radius:18px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Nunito',system-ui,sans-serif;background:var(--c-bg);color:var(--c-text);}
    #app{max-width:480px;margin:0 auto;min-height:100vh;}
    #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
      height:100vh;gap:12px;color:var(--c-muted);font-size:15px;}
    .spin{width:36px;height:36px;border:3px solid var(--c-border);border-top-color:var(--c-manolo);
      border-radius:50%;animation:rot .8s linear infinite;}
    @keyframes rot{to{transform:rotate(360deg);}}

    /* LOGIN */
    #login{display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:100vh;padding:32px 24px;background:linear-gradient(160deg,#dbeafe 0%,#fce7f3 100%);}
    .lhero{font-size:64px;animation:pop .4s ease;}
    @keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
    .ltitle{font-size:30px;font-weight:900;letter-spacing:-1px;margin:6px 0 4px;}
    .lsub{font-size:14px;color:var(--c-muted);margin-bottom:36px;}
    .lcards{display:flex;gap:16px;}
    .lc{background:#fff;border-radius:24px;padding:28px 32px;cursor:pointer;text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,.12);border:3px solid;transition:transform .15s;}
    .lc:active{transform:scale(.95);}
    .lc-e{font-size:52px;}.lc-n{font-size:17px;font-weight:800;margin-top:10px;}
    .lhint{margin-top:28px;font-size:12px;color:#94a3b8;text-align:center;max-width:260px;line-height:1.7;}

    /* HEADER */
    #hdr{color:#fff;padding:20px 18px 22px;transition:background .4s;}
    .htop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
    .hmeta{font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:1.5px;}
    .hwho{font-size:22px;font-weight:900;margin-top:2px;}
    .hbadge{background:rgba(255,255,255,.2);border-radius:50px;padding:3px 10px;
      font-size:11px;margin-top:5px;display:inline-block;font-weight:600;}
    .hnew{background:#22c55e;border-radius:50px;padding:3px 10px;font-size:11px;
      margin-top:5px;display:inline-block;font-weight:700;margin-left:6px;
      animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
    .hrollover{background:#f59e0b;border-radius:50px;padding:3px 10px;font-size:11px;
      margin-top:5px;display:inline-block;font-weight:700;margin-left:6px;}
    .bcam{background:rgba(255,255,255,.2);border:none;color:#fff;padding:7px 14px;
      border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;}
    .hdlbl{font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:4px;}
    .hmonto{font-size:52px;font-weight:900;letter-spacing:-2px;line-height:1;text-align:center;}
    .hsub{font-size:13px;opacity:.75;margin-top:6px;text-align:center;}
    .barw{background:rgba(255,255,255,.25);border-radius:50px;height:8px;margin:14px 0 16px;}
    .barf{height:8px;border-radius:50px;transition:width .6s;}
    .ctrl{background:rgba(0,0,0,.15);border-radius:var(--radius);padding:14px;}
    .ctrlt{font-size:12px;font-weight:700;opacity:.9;text-align:center;margin-bottom:10px;}
    .ajrow{display:flex;gap:6px;margin-bottom:8px;}
    .aj{flex:1;padding:7px 2px;border:2px solid rgba(255,255,255,.3);border-radius:10px;
      background:transparent;color:#fff;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;}
    .aj.on{border-color:#fff;background:rgba(255,255,255,.25);font-weight:900;}
    .pmrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .pm{padding:12px;border:2px solid rgba(255,255,255,.3);border-radius:14px;color:#fff;
      cursor:pointer;font-size:15px;font-weight:800;font-family:inherit;transition:transform .1s;}
    .pm:active{transform:scale(.96);}
    .pmm{background:rgba(0,0,0,.2);}.pmp{background:rgba(255,255,255,.2);}

    /* TABS */
    #tabs{display:flex;background:#fff;border-bottom:1px solid var(--c-border);
      position:sticky;top:0;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.04);overflow-x:auto;}
    .tab{flex:0 0 auto;padding:12px 10px;border:none;background:none;cursor:pointer;font-size:10px;
      color:#94a3b8;border-bottom:2.5px solid transparent;font-weight:600;
      font-family:inherit;transition:all .2s;white-space:nowrap;}
    .tab.on{color:var(--user-color);border-bottom-color:var(--user-color);font-weight:800;}

    #view{padding:16px 16px 90px;}

    /* ALERTAS */
    .alert{border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;
      display:flex;align-items:center;gap:12px;animation:si .3s ease;}
    .aw{background:linear-gradient(135deg,#fef3c7,#fde68a);}
    .ad{background:linear-gradient(135deg,#fee2e2,#fca5a5);}
    .an{background:linear-gradient(135deg,#d1fae5,#6ee7b7);}
    .at{font-size:13px;font-weight:800;color:#374151;}.as{font-size:12px;color:#6b7280;margin-top:2px;}

    /* BALANCE */
    .balc{border-radius:var(--radius);padding:15px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
    .bok{background:linear-gradient(135deg,#d1fae5,#a7f3d0);}
    .bwrn{background:linear-gradient(135deg,#fef3c7,#fde68a);}
    .bico{font-size:34px;}.binf{flex:1;}
    .bttl{font-size:13px;font-weight:800;color:#374151;}
    .bsb{font-size:12px;color:#6b7280;margin-top:2px;}
    .bmnt{font-size:20px;font-weight:900;color:#92400e;}

    /* META */
    .metac{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:14px;
      box-shadow:var(--shadow);border-left:4px solid #8b5cf6;}
    .metat{font-size:13px;font-weight:800;color:#5b21b6;margin-bottom:6px;}
    .metabw{background:#ede9fe;border-radius:50px;height:8px;}
    .metabf{background:linear-gradient(90deg,#8b5cf6,#a78bfa);height:8px;border-radius:50px;transition:width .6s;}
    .metas{font-size:11px;color:#7c3aed;margin-top:6px;font-weight:600;}

    /* USER CARDS */
    .ucards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
    .ucard{background:#fff;border-radius:var(--radius);padding:15px;border:2.5px solid var(--c-border);box-shadow:var(--shadow);}
    .ucard.act{border-color:var(--user-color);}
    .uce{font-size:28px;}.ucn{font-size:13px;color:var(--c-muted);margin-top:3px;font-weight:600;}
    .ucm{font-size:24px;font-weight:900;margin-top:3px;letter-spacing:-1px;}
    .ucc{font-size:11px;color:#94a3b8;margin-top:2px;}
    .mbw{background:#f1f5f9;border-radius:50px;height:4px;margin-top:8px;}
    .mbf{height:4px;border-radius:50px;transition:width .5s;}
    .st{font-size:14px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
    .stb{background:var(--c-border);color:var(--c-muted);font-size:11px;padding:3px 8px;border-radius:50px;font-weight:600;}

    /* GASTO CARD */
    .gc{background:#fff;border-radius:14px;padding:13px 14px;margin-bottom:9px;
      box-shadow:0 2px 10px rgba(0,0,0,.06);display:flex;align-items:center;gap:11px;
      border-left:4px solid;animation:si .2s ease;}
    @keyframes si{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
    .gci{font-size:26px;flex-shrink:0;}
    .gcinf{flex:1;min-width:0;}
    .gcd{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .gcm{font-size:11px;color:#94a3b8;margin-top:2px;}
    .gcspl{font-size:10px;background:#f0fdf4;color:#16a34a;border-radius:4px;padding:1px 5px;font-weight:700;margin-left:4px;}
    .gcr{text-align:right;flex-shrink:0;}
    .gcv{font-size:17px;font-weight:900;}
    .gcdel{background:none;border:none;cursor:pointer;font-size:15px;display:block;margin-top:2px;}

    /* HISTORIAL */
    .semb{margin-bottom:22px;}
    .semh{font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
    .semtot{font-size:12px;background:var(--c-border);padding:3px 8px;border-radius:50px;color:var(--c-muted);}
    .semmini{display:flex;gap:8px;margin-bottom:10px;}
    .semminicard{flex:1;border-radius:12px;padding:10px;text-align:center;}
    .semminiv{font-size:16px;font-weight:900;margin-top:2px;}

    /* CHARTS */
    .chcard{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:16px;}
    .chtitle{font-size:14px;font-weight:800;margin-bottom:16px;}
    .chwrap{position:relative;height:220px;display:flex;align-items:center;justify-content:center;}
    .msel{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
    .msb{background:var(--c-border);border:none;border-radius:10px;padding:6px 12px;cursor:pointer;font-size:18px;font-family:inherit;}
    .mslbl{flex:1;text-align:center;font-size:14px;font-weight:700;}

    /* FINANZAS */
    .fincard{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:16px;}
    .fintitle{font-size:15px;font-weight:800;margin-bottom:4px;}
    .finsub{font-size:12px;color:var(--c-muted);margin-bottom:16px;line-height:1.5;}
    .recrow{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .recinput{flex:1;border:2px solid var(--c-border);border-radius:10px;padding:9px 12px;
      font-size:14px;font-family:inherit;outline:none;background:#f8fafc;}
    .recinput:focus{border-color:var(--user-color);}
    .recdel{background:#fee2e2;border:none;border-radius:10px;padding:9px 12px;
      cursor:pointer;font-size:16px;flex-shrink:0;}
    .recitem{display:flex;align-items:center;justify-content:space-between;
      padding:10px 0;border-bottom:1px solid var(--c-border);}
    .recitem:last-child{border-bottom:none;}
    .recname{font-size:14px;font-weight:700;}
    .recmonto{font-size:14px;font-weight:800;color:#ef4444;}
    .budget-result{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-radius:var(--radius);
      padding:18px;margin-bottom:16px;text-align:center;}
    .br-label{font-size:12px;color:#3b82f6;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
    .br-monto{font-size:42px;font-weight:900;color:#1d4ed8;letter-spacing:-2px;margin:4px 0;}
    .br-sub{font-size:13px;color:#3b82f6;}
    .br-detail{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
    .brd{background:rgba(255,255,255,.7);border-radius:12px;padding:10px;text-align:center;}
    .brdn{font-size:11px;color:#64748b;}.brdv{font-size:15px;font-weight:800;color:#1e293b;margin-top:2px;}
    .rollover-banner{background:linear-gradient(135deg,#fffbeb,#fef3c7);border-radius:14px;
      padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;
      border:2px solid #fde68a;}

    /* RESUMEN MENSUAL IA */
    .resumen-ia{border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow);}
    .ri-header{background:linear-gradient(135deg,#1e1b4b,#312e81);padding:18px;color:#fff;}
    .ri-title{font-size:16px;font-weight:900;margin-bottom:4px;}
    .ri-mes{font-size:12px;opacity:.75;}
    .ri-body{background:#fff;padding:18px;}
    .ri-text{font-size:14px;line-height:1.8;color:#374151;white-space:pre-wrap;}
    .ri-loading{text-align:center;padding:32px;color:var(--c-muted);}
    .ri-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px;}
    .ris{background:#f8fafc;border-radius:12px;padding:10px;text-align:center;}
    .risn{font-size:10px;color:#64748b;font-weight:600;}.risv{font-size:16px;font-weight:900;margin-top:2px;}

    /* FORM */
    .fcard{background:#fff;border-radius:22px;padding:22px;box-shadow:var(--shadow);}
    .ftitle{font-size:17px;font-weight:800;margin-bottom:18px;}
    .flbl{display:block;font-size:12px;font-weight:800;color:#374151;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
    input[type=number],input[type=text]{width:100%;border:2px solid var(--c-border);
      border-radius:12px;padding:12px 14px;font-size:16px;color:var(--c-text);
      outline:none;background:#f8fafc;font-family:inherit;transition:border-color .2s;}
    input:focus{border-color:var(--user-color);background:#fff;}
    .inpm{font-size:38px!important;text-align:center;font-weight:900!important;letter-spacing:-1px;}
    .cg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
    .cb{padding:10px 4px;border:2px solid var(--c-border);border-radius:12px;background:#fff;
      cursor:pointer;font-size:11px;color:#374151;font-family:inherit;font-weight:600;transition:all .15s;}
    .cb.on{border-color:var(--user-color);background:var(--user-light);}
    .cb span{font-size:22px;display:block;margin-bottom:2px;}
    .splitrow{display:flex;align-items:center;justify-content:space-between;
      background:#f0fdf4;border-radius:12px;padding:12px 14px;margin-top:14px;
      border:2px solid #bbf7d0;cursor:pointer;}
    .splitrow.on{background:#dcfce7;border-color:#4ade80;}
    .splittgl{width:44px;height:24px;background:#ccc;border-radius:50px;position:relative;
      transition:background .2s;flex-shrink:0;}
    .splittgl.on{background:#22c55e;}
    .splittgl::after{content:"";width:18px;height:18px;background:#fff;border-radius:50%;
      position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
    .splittgl.on::after{left:23px;}
    .ocrbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
      padding:12px;border:2px dashed var(--c-border);border-radius:12px;background:#f8fafc;
      cursor:pointer;font-size:13px;font-weight:700;color:var(--c-muted);font-family:inherit;
      margin-top:12px;transition:all .2s;}
    .ocrbtn:hover,.ocrbtn.loading{border-color:var(--user-color);color:var(--user-color);background:var(--user-light);}
    #ocrin{display:none;}
    .btng{width:100%;margin-top:16px;padding:15px;font-size:16px;font-weight:900;color:#fff;
      border:none;border-radius:14px;cursor:pointer;background:var(--user-color);font-family:inherit;}
    .btng:disabled{opacity:.4;cursor:not-allowed;}

    /* CONFIG */
    .ss{margin-bottom:20px;}
    .sst{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--c-muted);margin-bottom:10px;}
    .scard{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
    .pe{display:flex;align-items:center;gap:14px;padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid var(--c-border);}
    .pe:last-child{padding-bottom:0;margin-bottom:0;border-bottom:none;}
    .peeb{font-size:44px;background:var(--c-bg);border:none;border-radius:14px;padding:8px 10px;cursor:pointer;flex-shrink:0;line-height:1;text-align:center;}
    .peni{width:100%;border:2px solid var(--c-border);border-radius:10px;padding:8px 12px;font-size:15px;font-weight:700;font-family:inherit;color:var(--c-text);background:#f8fafc;outline:none;}
    .pesv{margin-top:6px;border:none;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;color:#fff;}
    .dg{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px;}
    .db{padding:8px 2px;border:2px solid var(--c-border);border-radius:10px;background:#fff;cursor:pointer;font-size:11px;font-weight:700;color:var(--c-muted);font-family:inherit;}
    .db.on{border-color:var(--user-color);background:var(--user-light);color:var(--user-color);}
    .sr{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--c-border);}
    .sr:last-child{border-bottom:none;}
    .srl{font-size:14px;font-weight:700;}.srs{font-size:12px;color:var(--c-muted);margin-top:2px;}
    .srv{font-size:13px;font-weight:800;color:var(--user-color);}

    /* MODAL */
    .mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s;}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    .mobox{background:#fff;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:480px;animation:su .25s ease;}
    @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .mot{font-size:16px;font-weight:800;margin-bottom:16px;}
    .eg{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
    .eo{font-size:32px;background:var(--c-bg);border:2px solid transparent;border-radius:12px;padding:8px;cursor:pointer;text-align:center;}
    .eo.sel{border-color:var(--user-color);background:var(--user-light);}
    .moc{width:100%;margin-top:16px;padding:13px;background:#f1f5f9;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}

    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);
      color:#fff;padding:11px 22px;border-radius:50px;font-size:14px;font-weight:700;z-index:999;
      box-shadow:0 6px 24px rgba(0,0,0,.2);white-space:nowrap;opacity:0;transition:opacity .25s,transform .25s;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .btnsec{background:#f1f5f9;color:#475569;border:none;border-radius:14px;padding:12px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;margin-top:6px;}
    .bprimary{width:100%;padding:13px;font-size:14px;font-weight:800;color:#fff;border:none;border-radius:14px;cursor:pointer;font-family:inherit;margin-top:10px;}
    .empty{text-align:center;padding:48px 0;color:#94a3b8;}
    .emi{font-size:48px;margin-bottom:10px;}.emt{font-size:14px;font-weight:600;}
 /* --- FIX móvil --- */
button, a, .card, .lc, [role="button"]{
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.lc{
  user-select: none;
  -webkit-user-select: none;
}
  </style>
</head>

const DIAS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const AJS=[100,200,500,1000];

const fmt=n=>new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",minimumFractionDigits:0}).format(n);
const fmtD=iso=>new Date(iso).toLocaleDateString("es-MX",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
const fmtR=(a,b)=>`${a.toLocaleDateString("es-MX",{day:"2-digit",month:"short"})} – ${b.toLocaleDateString("es-MX",{day:"2-digit",month:"short"})}`;

function iniSem(diaI,offset=0){
  const h=new Date(); let d=h.getDay()-diaI; if(d<0)d+=7;
  const i=new Date(h); i.setDate(h.getDate()-d-(offset*7)); i.setHours(0,0,0,0); return i;
}
function finSem(i){const f=new Date(i);f.setDate(i.getDate()+6);f.setHours(23,59,59,999);return f;}
function keyI(i){return i.toISOString().split("T")[0];}
function mesKey(){const h=new Date();return `${h.getFullYear()}-${String(h.getMonth()+1).padStart(2,"0")}`;}
function weeksInMonth(year,month){
  // Approximate: number of full/partial weeks in that calendar month
  const d=new Date(year,month+1,0).getDate(); return Math.ceil(d/7);
}

// ── SEMANA NUEVA ──
let esSemNueva=false,rolloverEsaSemana=0;
function checkSemana(){
  const dI=state.settings.semanaInicia??4;
  const keyActual=keyI(iniSem(dI,0));
  esSemNueva=false; rolloverEsaSemana=0;
  if(state.ultimaSemana && state.ultimaSemana!==keyActual){
    esSemNueva=true;
    // Calcular sobrante semana anterior
    const iniAnt=iniSem(dI,1),finAnt=finSem(iniAnt);
    const keyAnt=keyI(iniAnt);
    const todos=Object.values(state.gastos||{});
    const gastAnt=todos.filter(g=>{const f=new Date(g.fecha);return f>=iniAnt&&f<=finAnt;})
      .reduce((s,g)=>s+g.monto,0);
    const presBase=state.settings.presupuesto??4000;
    const rollAnt=state.rollovers?.[keyAnt]||0;
    const presAnt=presBase+rollAnt;
    const sobrante=presAnt-gastAnt;
    if(sobrante>0 && !(state.rollovers?.[keyActual])){
      rolloverEsaSemana=Math.round(sobrante);
      state.rollovers=state.rollovers||{};
      state.rollovers[keyActual]=rolloverEsaSemana;
      save();
      if(Notification.permission==="granted"){
        new Notification("🆕 ¡Nueva semana!",{
          body:`Te sobraron ${fmt(sobrante)} la semana pasada — ya los sumamos a esta semana 🎉`
        });
      }
    }
    if(Notification.permission==="granted" && rolloverEsaSemana===0){
      new Notification("🆕 ¡Nueva semana!",{body:`Presupuesto de ${fmt(state.settings.presupuesto)} reiniciado.`});
    }
  }
  if(keyActual!==state.ultimaSemana){
    state.ultimaSemana=keyActual;
    set(ref(db,"gastos-pareja/ultimaSemana"),keyActual);
  }
}

// ── MES NUEVO → RESUMEN IA ──
function checkMes(){
  const mesActual=mesKey();
  if(state.ultimoMes && state.ultimoMes!==mesActual && !state.resumenesMensuales?.[state.ultimoMes]){
    generarResumenMensual(state.ultimoMes);
  }
  if(mesActual!==state.ultimoMes){
    state.ultimoMes=mesActual;
    set(ref(db,"gastos-pareja/ultimoMes"),mesActual);
  }
}

async function generarResumenMensual(mesStr){
  if(generandoResumen) return;
  generandoResumen=true;
  const todos=Object.values(state.gastos||{});
  const delMes=todos.filter(g=>g.fecha.startsWith(mesStr));
  if(delMes.length===0){generandoResumen=false;return;}
  const totalMes=delMes.reduce((s,g)=>s+g.monto,0);
  const mT=delMes.filter(g=>g.usuario==="manolo").reduce((s,g)=>s+g.monto,0);
  const eT=delMes.filter(g=>g.usuario==="esposa").reduce((s,g)=>s+g.monto,0);
  const catMap={};
  delMes.forEach(g=>{catMap[g.categoria]=(catMap[g.categoria]||0)+g.monto;});
  const catTop=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,3)
    .map(([id,v])=>`${CATS.find(c=>c.id===id)?.l||id}: ${fmt(v)}`).join(", ");
  const [anio,mes]=mesStr.split("-");
  const nomMes=MESES[parseInt(mes)-1];
  const pres=state.settings.presupuesto??4000;
  const semsMes=Math.round(new Date(parseInt(anio),parseInt(mes),0).getDate()/7);
  const presTotal=pres*semsMes;
  const p=state.perfiles;

  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:600,
        messages:[{role:"user",content:`Eres un asesor financiero amigable para una pareja mexicana. Genera un resumen mensual de sus finanzas de ${nomMes} ${anio} en español, tono cálido y motivador. Máximo 5 líneas cortas.

Datos:
- Pareja: ${p.manolo.nombre} y ${p.esposa.nombre}
- Gasto total: ${fmt(totalMes)}
- ${p.manolo.nombre} gastó: ${fmt(mT)} | ${p.esposa.nombre} gastó: ${fmt(eT)}
- Presupuesto estimado del mes: ${fmt(presTotal)}
- Top categorías: ${catTop}
- Total transacciones: ${delMes.length}

Incluye: evaluación del mes (bien/regular/mejorar), categoría más gastada, consejo práctico para el siguiente mes. Usa emojis. Sin markdown, sin asteriscos, solo texto limpio.`}]
      })
    });
    const data=await resp.json();
    const texto=data.content?.[0]?.text?.trim()||"";
    if(texto){
      if(!state.resumenesMensuales)state.resumenesMensuales={};
      state.resumenesMensuales[mesStr]={
        texto,totalMes,mT,eT,numGastos:delMes.length,
        generadoEn:new Date().toISOString()
      };
      await save();
    }
  }catch(e){console.error(e);}
  generandoResumen=false;
}

async function pedirNotif(){
  if(!("Notification" in window)){toast("Tu navegador no soporta notificaciones","#ef4444");return;}
  const p=await Notification.requestPermission();
  if(p==="granted"){state.settings.notifActivas=true;await save();toast("🔔 Activadas");
    new Notification("✅ Notificaciones activadas",{body:"Te avisaremos cuando gasten el 80% del presupuesto."});
  } else toast("Permiso denegado","#ef4444");
}
function checkNotif80(total,pres){
  if(!state.settings.notifActivas||Notification.permission!=="granted") return;
  const pct=(total/pres)*100;
  if(pct>=80&&pct<81) new Notification("⚠️ 80% gastado",{body:`Llevan ${fmt(total)} de ${fmt(pres)}.`});
}

// ── PRESUPUESTO INTELIGENTE ──
function calcPresupuestoSemanal(){
  const f=state.finanzas; if(!f.ingresoMensual) return null;
  const totalRec=(f.gastosRecurrentes||[]).reduce((s,r)=>s+r.monto,0);
  const disponibleMes=f.ingresoMensual-totalRec;
  const h=new Date(); const semanas=weeksInMonth(h.getFullYear(),h.getMonth());
  return {disponibleMes,totalRec,porSemana:Math.round(disponibleMes/semanas),semanas};
}

function vHome(gastos,pres,total,disp,rollover){
  const p=state.perfiles; const pct=(total/Math.max(pres,1))*100;
  const mT=gastos.filter(g=>g.usuario==="manolo").reduce((s,g)=>s+g.monto,0);
  const eT=gastos.filter(g=>g.usuario==="esposa").reduce((s,g)=>s+g.monto,0);
  const dif=Math.abs(mT-eT); const masG=mT>eT?"manolo":"esposa"; const menosG=mT>eT?"esposa":"manolo";

  let alertaHtml="";
  if(pct>=100) alertaHtml=`<div class="alert ad"><div style="font-size:28px">🚨</div><div><div class="at">¡Se pasaron del presupuesto!</div><div class="as">Llevan ${fmt(Math.abs(disp))} de más</div></div></div>`;
  else if(pct>=80) alertaHtml=`<div class="alert aw"><div style="font-size:28px">⚠️</div><div><div class="at">80% del presupuesto gastado</div><div class="as">Solo quedan ${fmt(disp)}</div></div></div>`;

  const meta=state.settings.metaAhorro||0;

    const ahorro=Math.max(0,pres-total); const pm=Math.min((ahorro/meta)*100,100);
    return `<div class="metac"><div class="metat">🎯 Meta de ahorro: ${fmt(meta)}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">

        <span style="font-size:12px;color:#7c3aed">${pm.toFixed(0)}%</span>
      </div>
      <div class="metabw"><div class="metabf" style="width:${pm}%"></div></div>
      <div class="metas">${pm>=100?"✅ ¡Meta alcanzada!":"Faltan "+fmt(Math.max(0,meta-ahorro))}</div>
    </div>`;
  })():"";

  const balHtml=dif<10?`<div class="balc bok"><div class="bico">⚖️</div><div class="binf"><div class="bttl">¡Están parejos!</div><div class="bsb">Ambos han gastado casi lo mismo esta semana</div></div></div>`:
    `<div class="balc bwrn"><div class="bico">💸</div><div class="binf"><div class="bttl">${p[menosG].emoji} ${p[menosG].nombre} puede pagar el próximo</div><div class="bsb">${p[masG].emoji} ${p[masG].nombre} lleva ${fmt(dif)} más gastado</div></div><div class="bmnt">${fmt(dif/2)}</div></div>`;

  const ucards=["manolo","esposa"].map(k=>{
    const u2=p[k]; const t=gastos.filter(g=>g.usuario===k).reduce((s,g)=>s+g.monto,0);
    const cnt=gastos.filter(g=>g.usuario===k).length; const pt=pres>0?Math.min((t/pres)*100,100):0;
    return `<div class="ucard${k===usuario?" act":""}"><div class="uce">${u2.emoji}</div>

    </div>`;
  }).join("");

  // Resumen mensual IA más reciente
  const claves=Object.keys(state.resumenesMensuales||{}).sort().reverse();

    const k=claves[0]; const r=state.resumenesMensuales[k];

// ── HISTORIAL ──
function vHistorial(todos){
  const dI=state.settings.semanaInicia??4;
  const mapa={};
  todos.forEach(g=>{
    const f=new Date(g.fecha); let d=f.getDay()-dI; if(d<0)d+=7;
    const ini=new Date(f); ini.setDate(f.getDate()-d); ini.setHours(0,0,0,0);
    const k=keyI(ini); if(!mapa[k])mapa[k]={ini,gastos:[]}; mapa[k].gastos.push(g);
  });
  const sems=Object.entries(mapa).sort((a,b)=>new Date(b[0])-new Date(a[0]));
  if(!sems.length) return `<div class="empty"><div class="emi">📭</div><div class="emt">Sin gastos aún</div></div>`;
  const keyAct=keyI(iniSem(dI,0)); const p=state.perfiles;
  return sems.map(([k,{ini,gastos}])=>{
    const fin=finSem(ini); const tot=gastos.reduce((s,g)=>s+g.monto,0);
    const mT=gastos.filter(g=>g.usuario==="manolo").reduce((s,g)=>s+g.monto,0);
    const eT=gastos.filter(g=>g.usuario==="esposa").reduce((s,g)=>s+g.monto,0);
    const roll=state.rollovers?.[k]||0;
    return `<div class="semb">
      <div class="semh">${k===keyAct?`<span>📅 Esta semana</span>`:fmtR(ini,fin)}
        <span class="semtot">${fmt(tot)}${roll>0?` +${fmt(roll)}🔄`:""}</span></div>
      <div class="semmini">
        <div class="semminicard" style="background:#EFF6FF"><div style="font-size:11px;color:#64748b">${p.manolo.emoji} ${p.manolo.nombre}</div><div class="semminiv" style="color:#2563EB">${fmt(mT)}</div></div>
        <div class="semminicard" style="background:#FDF2F8"><div style="font-size:11px;color:#64748b">${p.esposa.emoji} ${p.esposa.nombre}</div><div class="semminiv" style="color:#DB2777">${fmt(eT)}</div></div>

// ── OCR ──
window.triggerOCR=()=>{
  const input=document.getElementById("ocrin");
  input.onchange=async e=>{
    const file=e.target.files[0]; if(!file)return;
    ocrLoading=true; renderApp();
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:file.type,data:b64}},
            {type:"text",text:"Analiza esta foto de ticket/recibo. Extrae ÚNICAMENTE el monto TOTAL. Responde SOLO el número sin símbolo de moneda. Si no hay monto claro responde: 0"}
          ]}]})
      });
      const data=await resp.json();
      const monto=parseFloat((data.content?.[0]?.text?.trim()||"0").replace(/[^0-9.]/g,""));
      ocrLoading=false; renderApp();
      if(monto>0){
        setTimeout(()=>{const inp=document.getElementById("im");if(inp){inp.value=monto;chkF();toast(`📷 Detectado: ${fmt(monto)}`,"#10b981");}},100);
      } else toast("No se detectó monto","#f59e0b");
    }catch(err){ocrLoading=false;renderApp();toast("Error al procesar imagen","#ef4444");}
    input.value="";
  };
  input.click();
};

window.agregar=async()=>{
  if(saving)return; const monto=parseFloat(document.getElementById("im")?.value);
  const desc=document.getElementById("id2")?.value?.trim(); if(!monto||!desc)return; saving=true;
  const fecha=new Date().toISOString();
  if(splitActivo){
    const mitad=Math.round((monto/2)*10)/10;
    ["manolo","esposa"].forEach(u=>{state.gastos["g"+Date.now()+u]={usuario:u,monto:mitad,descripcion:desc,categoria:cat,fecha,split:true};});
    toast(`✅ ${fmt(monto)} dividido`);
  } else {
    state.gastos["g"+Date.now()]={usuario,monto,descripcion:desc,categoria:cat,fecha};
    toast(`✅ ${fmt(monto)} registrado`);
  }
  await save(); saving=false; splitActivo=false; vista="home"; renderApp();
};
window.del=async id=>{
  if(!confirm("¿Eliminar?"))return; delete state.gastos[id]; await save(); toast("🗑️ Eliminado","#ef4444");
};
window.setDia=async i=>{state.settings.semanaInicia=i;await save();toast(`📅 Semana inicia el ${DIAS[i]}`);};
window.savePerfil=async k=>{
  const n=document.getElementById(`pn-${k}`)?.value?.trim(); if(!n)return;
  state.perfiles[k].nombre=n; await save(); toast(`✅ Nombre: ${n}`);
};
window.saveMeta=async()=>{
  const v=parseFloat(document.getElementById("inp-meta")?.value)||0;
  state.settings.metaAhorro=v; await save(); toast(v>0?`🎯 Meta: ${fmt(v)}`:"Meta eliminada");
};
window.openModal=k=>{emojiFor=k;renderApp();};
window.closeModal=e=>{if(e.target.classList.contains("mo")){emojiFor=null;renderApp();}};
window.selEmoji=async(k,e)=>{state.perfiles[k].emoji=e;await save();emojiFor=null;toast("✅ Avatar actualizado");};
window.pedirNotif=pedirNotif;

function toast(msg,color="#10b981"){
  const el=document.getElementById("toast"); if(!el)return;
  el.textContent=msg; el.style.background=color;
  el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),2500);
}
</script>
</body>
</html>
