<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Gastos Pareja 💑</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    :root{
      --c-manolo:#2563EB;--c-esposa:#DB2777;
      --user-color:#2563EB;--user-light:#EFF6FF;
      --c-bg:#F0F4FF;--c-card:#fff;
      --c-text:#1e293b;--c-muted:#64748b;
      --c-border:#e2e8f0;--shadow:0 4px 20px rgba(0,0,0,.08);
      --radius:18px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Nunito',system-ui,sans-serif;background:var(--c-bg);color:var(--c-text);}
    #app{max-width:480px;margin:0 auto;min-height:100vh;}

    /* LOADING */
    #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
      height:100vh;gap:12px;color:var(--c-muted);font-size:15px;}
    .spin{width:36px;height:36px;border:3px solid var(--c-border);
      border-top-color:var(--c-manolo);border-radius:50%;animation:rot .8s linear infinite;}
    @keyframes rot{to{transform:rotate(360deg);}}

    /* LOGIN */
    #login{display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:100vh;padding:32px 24px;
      background:linear-gradient(160deg,#dbeafe 0%,#fce7f3 100%);}
    .login-hero{font-size:64px;animation:pop .4s ease;}
    @keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
    .login-title{font-size:30px;font-weight:900;letter-spacing:-1px;margin:6px 0 4px;}
    .login-sub{font-size:14px;color:var(--c-muted);margin-bottom:36px;}
    .login-cards{display:flex;gap:16px;}
    .lc{background:#fff;border-radius:24px;padding:28px 32px;cursor:pointer;text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,.12);border:3px solid;transition:transform .15s;}
    .lc:active{transform:scale(.95);}
    .lc-emoji{font-size:52px;}
    .lc-name{font-size:17px;font-weight:800;margin-top:10px;}
    .login-hint{margin-top:28px;font-size:12px;color:#94a3b8;text-align:center;
      max-width:260px;line-height:1.7;}

    /* HEADER */
    #hdr{color:#fff;padding:20px 18px 22px;transition:background .4s;}
    .h-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
    .h-meta{font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:1.5px;}
    .h-who{font-size:22px;font-weight:900;margin-top:2px;}
    .h-badge{background:rgba(255,255,255,.2);border-radius:50px;padding:3px 10px;
      font-size:11px;margin-top:5px;display:inline-block;font-weight:600;}
    .h-new-week{background:#22c55e;border-radius:50px;padding:3px 10px;
      font-size:11px;margin-top:5px;display:inline-block;font-weight:700;margin-left:6px;
      animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
    .btn-cam{background:rgba(255,255,255,.2);border:none;color:#fff;padding:7px 14px;
      border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;}
    .h-disp-lbl{font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:1px;
      text-align:center;margin-bottom:4px;}
    .h-monto{font-size:52px;font-weight:900;letter-spacing:-2px;line-height:1;text-align:center;}
    .h-sub{font-size:13px;opacity:.75;margin-top:6px;text-align:center;}
    .bar-w{background:rgba(255,255,255,.25);border-radius:50px;height:8px;margin:14px 0 16px;}
    .bar-f{height:8px;border-radius:50px;transition:width .6s;}

    /* PRESUPUESTO CTRL */
    .ctrl{background:rgba(0,0,0,.15);border-radius:var(--radius);padding:14px;}
    .ctrl-t{font-size:12px;font-weight:700;opacity:.9;text-align:center;margin-bottom:10px;}
    .aj-row{display:flex;gap:6px;margin-bottom:8px;}
    .aj{flex:1;padding:7px 2px;border:2px solid rgba(255,255,255,.3);border-radius:10px;
      background:transparent;color:#fff;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;}
    .aj.on{border-color:#fff;background:rgba(255,255,255,.25);font-weight:900;}
    .pm-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .pm{padding:12px;border:2px solid rgba(255,255,255,.3);border-radius:14px;
      color:#fff;cursor:pointer;font-size:15px;font-weight:800;font-family:inherit;transition:transform .1s;}
    .pm:active{transform:scale(.96);}
    .pm-m{background:rgba(0,0,0,.2);}
    .pm-p{background:rgba(255,255,255,.2);}

    /* TABS */
    #tabs{display:flex;background:#fff;border-bottom:1px solid var(--c-border);
      position:sticky;top:0;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.04);}
    .tab{flex:1;padding:12px 1px;border:none;background:none;cursor:pointer;font-size:10px;
      color:#94a3b8;border-bottom:2.5px solid transparent;font-weight:600;
      font-family:inherit;transition:all .2s;line-height:1.3;}
    .tab.on{color:var(--user-color);border-bottom-color:var(--user-color);font-weight:800;}

    /* VIEW */
    #view{padding:16px 16px 90px;}

    /* ALERTA */
    .alerta{border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;
      display:flex;align-items:center;gap:12px;animation:si .3s ease;}
    .alerta-warn{background:linear-gradient(135deg,#fef3c7,#fde68a);}
    .alerta-danger{background:linear-gradient(135deg,#fee2e2,#fca5a5);}
    .alerta-nueva{background:linear-gradient(135deg,#d1fae5,#6ee7b7);}
    .al-icon{font-size:28px;}
    .al-t{font-size:13px;font-weight:800;color:#374151;}
    .al-s{font-size:12px;color:#6b7280;margin-top:2px;}

    /* BALANCE */
    .bal-card{border-radius:var(--radius);padding:15px 18px;margin-bottom:14px;
      display:flex;align-items:center;gap:14px;}
    .bal-ok{background:linear-gradient(135deg,#d1fae5,#a7f3d0);}
    .bal-warn{background:linear-gradient(135deg,#fef3c7,#fde68a);}
    .bal-icon{font-size:34px;}
    .bal-info{flex:1;}
    .bal-title{font-size:13px;font-weight:800;color:#374151;}
    .bal-sub{font-size:12px;color:#6b7280;margin-top:2px;}
    .bal-monto{font-size:20px;font-weight:900;color:#92400e;}

    /* META AHORRO */
    .meta-card{background:#fff;border-radius:var(--radius);padding:16px;
      margin-bottom:14px;box-shadow:var(--shadow);border-left:4px solid #8b5cf6;}
    .meta-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .meta-title{font-size:13px;font-weight:800;color:#5b21b6;}
    .meta-monto{font-size:16px;font-weight:900;color:#5b21b6;}
    .meta-bar-w{background:#ede9fe;border-radius:50px;height:8px;}
    .meta-bar-f{background:linear-gradient(90deg,#8b5cf6,#a78bfa);height:8px;border-radius:50px;transition:width .6s;}
    .meta-sub{font-size:11px;color:#7c3aed;margin-top:6px;font-weight:600;}

    /* USER CARDS */
    .ucards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
    .ucard{background:#fff;border-radius:var(--radius);padding:15px;
      border:2.5px solid var(--c-border);box-shadow:var(--shadow);}
    .ucard.act{border-color:var(--user-color);}
    .uc-e{font-size:28px;}
    .uc-n{font-size:13px;color:var(--c-muted);margin-top:3px;font-weight:600;}
    .uc-m{font-size:24px;font-weight:900;margin-top:3px;letter-spacing:-1px;}
    .uc-c{font-size:11px;color:#94a3b8;margin-top:2px;}
    .mb-w{background:#f1f5f9;border-radius:50px;height:4px;margin-top:8px;}
    .mb-f{height:4px;border-radius:50px;transition:width .5s;}

    /* SEC TITLE */
    .st{font-size:14px;font-weight:800;margin-bottom:12px;display:flex;
      align-items:center;justify-content:space-between;}
    .st-badge{background:var(--c-border);color:var(--c-muted);font-size:11px;
      padding:3px 8px;border-radius:50px;font-weight:600;}

    /* GASTO CARD */
    .gc{background:#fff;border-radius:14px;padding:13px 14px;margin-bottom:9px;
      box-shadow:0 2px 10px rgba(0,0,0,.06);display:flex;align-items:center;
      gap:11px;border-left:4px solid;animation:si .2s ease;}
    @keyframes si{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
    .gc-i{font-size:26px;flex-shrink:0;}
    .gc-inf{flex:1;min-width:0;}
    .gc-d{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .gc-m{font-size:11px;color:#94a3b8;margin-top:2px;}
    .gc-split{font-size:10px;background:#f0fdf4;color:#16a34a;border-radius:4px;
      padding:1px 5px;font-weight:700;margin-left:4px;}
    .gc-r{text-align:right;flex-shrink:0;}
    .gc-v{font-size:17px;font-weight:900;}
    .gc-del{background:none;border:none;cursor:pointer;font-size:15px;display:block;margin-top:2px;}

    /* HISTORIAL */
    .sem-blk{margin-bottom:22px;}
    .sem-hdr{font-size:13px;font-weight:800;margin-bottom:10px;
      display:flex;align-items:center;justify-content:space-between;}
    .sem-tot{font-size:12px;background:var(--c-border);padding:3px 8px;
      border-radius:50px;color:var(--c-muted);}
    .sem-mini{display:flex;gap:8px;margin-bottom:10px;}
    .sem-mini-card{flex:1;border-radius:12px;padding:10px;text-align:center;}
    .sem-mini-n{font-size:11px;color:#64748b;}
    .sem-mini-v{font-size:16px;font-weight:900;margin-top:2px;}

    /* ANÁLISIS */
    .chart-card{background:#fff;border-radius:var(--radius);padding:18px;
      box-shadow:var(--shadow);margin-bottom:16px;}
    .chart-title{font-size:14px;font-weight:800;margin-bottom:16px;color:var(--c-text);}
    .chart-wrap{position:relative;height:220px;display:flex;align-items:center;justify-content:center;}
    .chart-wrap canvas{max-width:100%;}
    .month-selector{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
    .ms-btn{background:var(--c-border);border:none;border-radius:10px;
      padding:6px 12px;cursor:pointer;font-size:18px;font-family:inherit;}
    .ms-label{flex:1;text-align:center;font-size:14px;font-weight:700;}
    .mes-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;
      box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;justify-content:space-between;align-items:center;}
    .mes-nombre{font-size:14px;font-weight:700;}
    .mes-sub{font-size:12px;color:var(--c-muted);margin-top:2px;}
    .mes-total{font-size:18px;font-weight:900;color:var(--user-color);}

    /* EMPTY */
    .empty{text-align:center;padding:48px 0;color:#94a3b8;}
    .em-i{font-size:48px;margin-bottom:10px;}
    .em-t{font-size:14px;font-weight:600;}

    /* FORM */
    .fcard{background:#fff;border-radius:22px;padding:22px;box-shadow:var(--shadow);}
    .ftitle{font-size:17px;font-weight:800;margin-bottom:18px;}
    .flbl{display:block;font-size:12px;font-weight:800;color:#374151;
      margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
    input[type=number],input[type=text]{width:100%;border:2px solid var(--c-border);
      border-radius:12px;padding:12px 14px;font-size:16px;color:var(--c-text);
      outline:none;background:#f8fafc;font-family:inherit;transition:border-color .2s;}
    input:focus{border-color:var(--user-color);background:#fff;}
    .inpm{font-size:38px!important;text-align:center;font-weight:900!important;letter-spacing:-1px;}
    .cg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
    .cb{padding:10px 4px;border:2px solid var(--c-border);border-radius:12px;background:#fff;
      cursor:pointer;font-size:11px;color:#374151;font-family:inherit;font-weight:600;transition:all .15s;}
    .cb.on{border-color:var(--user-color);background:var(--user-light);}
    .cb span{font-size:22px;display:block;margin-bottom:2px;}

    /* SPLIT TOGGLE */
    .split-row{display:flex;align-items:center;justify-content:space-between;
      background:#f0fdf4;border-radius:12px;padding:12px 14px;margin-top:14px;
      border:2px solid #bbf7d0;cursor:pointer;}
    .split-row.on{background:#dcfce7;border-color:#4ade80;}
    .split-label{font-size:13px;font-weight:700;color:#15803d;}
    .split-sub{font-size:11px;color:#4ade80;margin-top:2px;}
    .toggle{width:44px;height:24px;background:#ccc;border-radius:50px;
      position:relative;transition:background .2s;flex-shrink:0;}
    .toggle.on{background:#22c55e;}
    .toggle::after{content:"";width:18px;height:18px;background:#fff;border-radius:50%;
      position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
    .toggle.on::after{left:23px;}

    /* OCR BUTTON */
    .ocr-btn{display:flex;align-items:center;justify-content:center;gap:8px;
      width:100%;padding:12px;border:2px dashed var(--c-border);border-radius:12px;
      background:#f8fafc;cursor:pointer;font-size:13px;font-weight:700;
      color:var(--c-muted);font-family:inherit;margin-top:12px;transition:all .2s;}
    .ocr-btn:hover{border-color:var(--user-color);color:var(--user-color);background:var(--user-light);}
    .ocr-loading{border-color:var(--user-color);color:var(--user-color);background:var(--user-light);}
    #ocr-input{display:none;}

    .btn-g{width:100%;margin-top:16px;padding:15px;font-size:16px;font-weight:900;
      color:#fff;border:none;border-radius:14px;cursor:pointer;background:var(--user-color);
      font-family:inherit;transition:opacity .2s;}
    .btn-g:disabled{opacity:.4;cursor:not-allowed;}

    /* CONFIG */
    .ss{margin-bottom:20px;}
    .ss-t{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;
      color:var(--c-muted);margin-bottom:10px;}
    .scard{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);}
    .pe{display:flex;align-items:center;gap:14px;padding-bottom:16px;margin-bottom:16px;
      border-bottom:1px solid var(--c-border);}
    .pe:last-child{padding-bottom:0;margin-bottom:0;border-bottom:none;}
    .pe-eb{font-size:44px;background:var(--c-bg);border:none;border-radius:14px;
      padding:8px 10px;cursor:pointer;flex-shrink:0;line-height:1;text-align:center;}
    .pe-info{flex:1;}
    .pe-ni{width:100%;border:2px solid var(--c-border);border-radius:10px;
      padding:8px 12px;font-size:15px;font-weight:700;font-family:inherit;
      color:var(--c-text);background:#f8fafc;outline:none;}
    .pe-sv{margin-top:6px;border:none;border-radius:10px;padding:7px 14px;
      font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;color:#fff;}
    .dg{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px;}
    .db{padding:8px 2px;border:2px solid var(--c-border);border-radius:10px;
      background:#fff;cursor:pointer;font-size:11px;font-weight:700;
      color:var(--c-muted);font-family:inherit;transition:all .15s;}
    .db.on{border-color:var(--user-color);background:var(--user-light);color:var(--user-color);}
    .sr{display:flex;justify-content:space-between;align-items:center;
      padding:12px 0;border-bottom:1px solid var(--c-border);}
    .sr:last-child{border-bottom:none;}
    .sr-l{font-size:14px;font-weight:700;}
    .sr-s{font-size:12px;color:var(--c-muted);margin-top:2px;}
    .sr-v{font-size:13px;font-weight:800;color:var(--user-color);}

    /* MODAL */
    .mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
      display:flex;align-items:flex-end;justify-content:center;animation:fi .2s;}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    .mb{background:#fff;border-radius:24px 24px 0 0;padding:24px;width:100%;
      max-width:480px;animation:su .25s ease;}
    @keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .mt{font-size:16px;font-weight:800;margin-bottom:16px;}
    .eg{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
    .eo{font-size:32px;background:var(--c-bg);border:2px solid transparent;
      border-radius:12px;padding:8px;cursor:pointer;text-align:center;transition:transform .15s;}
    .eo:active{transform:scale(.88);}
    .eo.sel{border-color:var(--user-color);background:var(--user-light);}
    .mc{width:100%;margin-top:16px;padding:13px;background:#f1f5f9;border:none;
      border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}

    /* NOTIF BANNER */
    .notif-banner{background:linear-gradient(135deg,#fbbf24,#f59e0b);
      border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;
      display:flex;align-items:center;gap:12px;}
    .nb-icon{font-size:28px;}
    .nb-t{font-size:13px;font-weight:800;color:#78350f;}
    .nb-s{font-size:12px;color:#92400e;margin-top:2px;}
    .nb-btn{background:#78350f;color:#fff;border:none;border-radius:10px;
      padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;
      font-family:inherit;flex-shrink:0;}

    /* TOAST */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);
      color:#fff;padding:11px 22px;border-radius:50px;font-size:14px;font-weight:700;
      z-index:999;box-shadow:0 6px 24px rgba(0,0,0,.2);white-space:nowrap;
      opacity:0;transition:opacity .25s,transform .25s;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    .btn-sec{background:#f1f5f9;color:#475569;border:none;border-radius:14px;
      padding:12px 20px;font-size:13px;font-weight:700;cursor:pointer;
      font-family:inherit;width:100%;margin-top:6px;}

    /* NOTIF BADGE */
    .notif-badge{background:#ef4444;color:#fff;font-size:9px;font-weight:800;
      border-radius:50%;width:14px;height:14px;display:inline-flex;align-items:center;
      justify-content:center;position:relative;top:-6px;left:-4px;}
  </style>
</head>

const EMOJIS = {

  {id:"comida",l:"Comida",i:"🍽️",c:"#f59e0b"},
  {id:"trans",l:"Transporte",i:"🚗",c:"#10b981"},

  {id:"otro",l:"Otro",i:"📦",c:"#94a3b8"}
];
const DIAS = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Jul","Agosto","Sep","Octubre","Nov","Diciembre"];
const AJS = [100,200,500,1000];

const fmt = n => new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",minimumFractionDigits:0}).format(n);
const fmtD = iso => new Date(iso).toLocaleDateString("es-MX",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
const fmtR = (a,b) => `${a.toLocaleDateString("es-MX",{day:"2-digit",month:"short"})} – ${b.toLocaleDateString("es-MX",{day:"2-digit",month:"short"})}`;

function inicioSem(diaI,offset=0){
  const hoy=new Date(); let d=hoy.getDay()-diaI; if(d<0)d+=7;
  const ini=new Date(hoy); ini.setDate(hoy.getDate()-d-(offset*7)); ini.setHours(0,0,0,0); return ini;
}
function finSem(ini){
  const f=new Date(ini); f.setDate(f.getDate()+6); f.setHours(23,59,59,999); return f;
}
function keyIni(ini){ return ini.toISOString().split("T")[0]; }

// ── STATE ──────────────────────────────────
let db;
let state = {
  settings:{presupuesto:4000,semanaInicia:4,metaAhorro:0,notifActivas:false},
  perfiles:{manolo:{nombre:"Manolo",emoji:"👨"},esposa:{nombre:"Esposa",emoji:"👩"}},
  gastos:{},
  ultimaSemana:null
};
let usuario=null,vista="home",ajuste=100,cat="super",emojiFor=null,saving=false;
let splitActivo=false,ocrLoading=false;
let mesOffset=0; // para análisis mensual
let chartCat=null, chartMes=null;
let notifBadge=false;

const app2=initializeApp(firebaseConfig);
db=getDatabase(app2);
onValue(ref(db,"gastos-pareja"),snap=>{
  if(snap.exists()){
    const v=snap.val();
    if(v.settings) state.settings={...state.settings,...v.settings};
    if(v.perfiles) state.perfiles=v.perfiles;
    state.gastos=v.gastos||{};
    state.ultimaSemana=v.ultimaSemana||null;
  }
  checkNuevaSemanaBadge();
  render();
});

const save=()=>set(ref(db,"gastos-pareja"),state);

// ── SEMANA NUEVA DETECTION ─────────────────
function checkNuevaSemanaBadge(){
  const dI=state.settings.semanaInicia??4;
  const iniActual=keyIni(inicioSem(dI,0));
  if(state.ultimaSemana && state.ultimaSemana!==iniActual){
    notifBadge=true;
    // Notificación del navegador
    if(Notification.permission==="granted"){
      new Notification("🆕 ¡Nueva semana!",{
        body:`Presupuesto de ${fmt(state.settings.presupuesto)} reiniciado. ¡A cuidar los gastos!`,
        icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💑</text></svg>"
      });
    }
  }
  // Guardar semana actual
  if(iniActual!==state.ultimaSemana){
    state.ultimaSemana=iniActual;
    set(ref(db,"gastos-pareja/ultimaSemana"),iniActual);
  }
}

// ── NOTIFICACIONES ─────────────────────────
async function pedirNotif(){
  if(!("Notification" in window)){toast("Tu navegador no soporta notificaciones","#ef4444");return;}
  const perm=await Notification.requestPermission();
  if(perm==="granted"){
    state.settings.notifActivas=true;
    await save();
    toast("🔔 Notificaciones activadas");
    new Notification("✅ Notificaciones activadas",{body:"Te avisaremos cuando gasten el 80% del presupuesto."});
  } else {
    toast("Permiso denegado","#ef4444");
  }
}

function checkNotif80(total,pres){
  if(!state.settings.notifActivas) return;
  const pct=(total/pres)*100;
  if(pct>=80&&pct<100&&Notification.permission==="granted"){
    new Notification("⚠️ 80% del presupuesto gastado",{
      body:`Llevan ${fmt(total)} de ${fmt(pres)}. Solo quedan ${fmt(pres-total)}.`
    });
  }
}

// ── RENDER ─────────────────────────────────
function render(){
  if(!usuario){renderLogin();return;}
  renderApp();
}

window.elegir=k=>{
  usuario=k;
  document.documentElement.style.setProperty("--user-color",COL[k]);
  document.documentElement.style.setProperty("--user-light",k==="manolo"?"#EFF6FF":"#FDF2F8");
  vista="home"; render();
};

function renderApp(){
  if(chartCat){try{chartCat.destroy();}catch(e){} chartCat=null;}
  if(chartMes){try{chartMes.destroy();}catch(e){} chartMes=null;}

  const u=usuario,p=state.perfiles,s=state.settings;
  const dI=s.semanaInicia??4,pres=s.presupuesto??4000;
  const iniA=inicioSem(dI,0),finA=finSem(iniA);
  const esNuevaSemana=notifBadge;

  const todos=Object.entries(state.gastos||{}).map(([id,g])=>({...g,id}))
    .sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const semActual=todos.filter(g=>{const f=new Date(g.fecha);return f>=iniA&&f<=finA;});
  const total=semActual.reduce((s,g)=>s+g.monto,0);
  const disp=pres-total; const pct=Math.min((total/Math.max(pres,1))*100,100);
  const rojo=disp<0; const hdrBg=rojo?"#dc2626":COL[u];

  // Check 80%
  if(pct>=80) checkNotif80(total,pres);

  document.getElementById("app").innerHTML=`
    <div id="toast"></div>
    ${emojiFor?renderModal():""}
    <div id="hdr" style="background:${hdrBg}">
      <div class="h-top">
        <div>
          <div class="h-meta">Semana actual</div>
          <div class="h-who">${p[u].emoji} ${p[u].nombre}</div>
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-top:4px">
            <div class="h-badge">${fmtR(iniA,finA)} · ${DIAS[dI]}</div>
            ${esNuevaSemana?`<div class="h-new-week">🆕 Nueva semana</div>`:""}
          </div>
        </div>
        <button class="btn-cam" onclick="cambU()">Cambiar 🔄</button>
      </div>
      <div class="h-disp-lbl">${rojo?"⚠️ Te pasaste por":"Disponible"}</div>
      <div class="h-monto">${fmt(Math.abs(disp))}</div>
      <div class="h-sub">Gastado ${fmt(total)} de ${fmt(pres)}</div>
      <div class="bar-w"><div class="bar-f" style="width:${pct}%;background:${rojo?"#fbbf24":"rgba(255,255,255,.9)"}"></div></div>
      <div class="ctrl">
        <div class="ctrl-t">💰 Ajustar presupuesto semanal</div>
        <div class="aj-row">${AJS.map(a=>`<button class="aj${a===ajuste?" on":""}" onclick="setAj(${a})">$${a}</button>`).join("")}</div>
        <div class="pm-row">
          <button class="pm pm-m" onclick="camPres(-${ajuste})">− ${fmt(ajuste)}</button>
          <button class="pm pm-p" onclick="camPres(${ajuste})">+ ${fmt(ajuste)}</button>
        </div>
      </div>
    </div>
    <div id="tabs">
      <button class="tab${vista==="home"?" on":""}" onclick="sv('home')">📊 Resumen</button>
      <button class="tab${vista==="agregar"?" on":""}" onclick="sv('agregar')">➕ Agregar</button>
      <button class="tab${vista==="historial"?" on":""}" onclick="sv('historial')">📅 Semanas</button>
      <button class="tab${vista==="analisis"?" on":""}" onclick="sv('analisis')">📈 Análisis</button>
      <button class="tab${vista==="config"?" on":""}" onclick="sv('config')">⚙️ Config</button>
    </div>
    <div id="view">${vistas(semActual,todos,pres,total,disp)}</div>`;

  if(vista==="analisis") renderCharts(todos);
}

function vistas(sem,todos,pres,total,disp){
  if(vista==="home")      return vHome(sem,pres,total,disp);
  if(vista==="agregar")   return vAgregar();
  if(vista==="historial") return vHistorial(todos);
  if(vista==="analisis")  return vAnalisis(todos);
  if(vista==="config")    return vConfig();
  return "";
}

// ── HOME ────────────────────────────────────
function vHome(gastos,pres,total,disp){
  const p=state.perfiles;
  const pct=(total/Math.max(pres,1))*100;
  const mT=gastos.filter(g=>g.usuario==="manolo").reduce((s,g)=>s+g.monto,0);
  const eT=gastos.filter(g=>g.usuario==="esposa").reduce((s,g)=>s+g.monto,0);
  const dif=Math.abs(mT-eT);
  const masGasto=mT>eT?"manolo":"esposa";
  const menosGasto=mT>eT?"esposa":"manolo";

  // Alerta presupuesto
  let alertaHtml="";
  if(pct>=100){
    alertaHtml=`<div class="alerta alerta-danger">
      <div class="al-icon">🚨</div>
      <div><div class="al-t">¡Se pasaron del presupuesto!</div>
        <div class="al-s">Llevan ${fmt(Math.abs(disp))} de más esta semana</div></div>
    </div>`;
  } else if(pct>=80){
    alertaHtml=`<div class="alerta alerta-warn">
      <div class="al-icon">⚠️</div>
      <div><div class="al-t">80% del presupuesto gastado</div>
        <div class="al-s">Solo quedan ${fmt(disp)} para terminar la semana</div></div>
    </div>`;
  } else if(notifBadge){
    alertaHtml=`<div class="alerta alerta-nueva">
      <div class="al-icon">🎉</div>
      <div><div class="al-t">¡Nueva semana, presupuesto renovado!</div>
        <div class="al-s">Empiezan con ${fmt(pres)} disponibles</div></div>
    </div>`;
  }

  // Meta ahorro
  const meta=state.settings.metaAhorro||0;
  const metaHtml = meta>0 ? (()=>{
    const ahorro=Math.max(0,pres-total);
    const pctMeta=Math.min((ahorro/meta)*100,100);
    const falta=Math.max(0,meta-ahorro);
    return `<div class="meta-card">
      <div class="meta-top">
        <div class="meta-title">🎯 Meta de ahorro: ${fmt(meta)}</div>
        <div class="meta-monto">${fmt(ahorro)}</div>
      </div>
      <div class="meta-bar-w"><div class="meta-bar-f" style="width:${pctMeta}%"></div></div>
      <div class="meta-sub">${pctMeta>=100?"✅ ¡Meta alcanzada esta semana!":"Faltan "+fmt(falta)+" para tu meta"}</div>
    </div>`;
  })():"";

  const balHtml = dif<10 ? `
    <div class="bal-card bal-ok">
      <div class="bal-icon">⚖️</div>
      <div class="bal-info"><div class="bal-title">¡Están parejos!</div>
        <div class="bal-sub">Ambos han gastado casi lo mismo esta semana</div></div>
    </div>` : `
    <div class="bal-card bal-warn">
      <div class="bal-icon">💸</div>
      <div class="bal-info">
        <div class="bal-title">${p[menosGasto].emoji} ${p[menosGasto].nombre} puede pagar el próximo</div>
        <div class="bal-sub">${p[masGasto].emoji} ${p[masGasto].nombre} lleva ${fmt(dif)} más gastado</div>
      </div>
      <div class="bal-monto">${fmt(dif/2)}</div>
    </div>`;

  const ucards=["manolo","esposa"].map(k=>{
    const u2=p[k]; const t=gastos.filter(g=>g.usuario===k).reduce((s,g)=>s+g.monto,0);
    const cnt=gastos.filter(g=>g.usuario===k).length;
    const pt=pres>0?Math.min((t/pres)*100,100):0;
    return `<div class="ucard${k===usuario?" act":""}">
      <div class="uc-e">${u2.emoji}</div><div class="uc-n">${u2.nombre}</div>
      <div class="uc-m" style="color:${COL[k]}">${fmt(t)}</div>
      <div class="uc-c">${cnt} gasto${cnt!==1?"s":""} · ${pt.toFixed(0)}%</div>
      <div class="mb-w"><div class="mb-f" style="width:${pt}%;background:${COL[k]}"></div></div>
    </div>`;
  }).join("");

  const ultimos=gastos.slice(0,5).map(gcard).join("");
  return `${alertaHtml}${metaHtml}${balHtml}
    <div class="ucards">${ucards}</div>
    <div class="st">Últimos movimientos<span class="st-badge">${gastos.length}</span></div>
    ${gastos.length===0?`<div class="empty"><div class="em-i">📭</div><div class="em-t">Sin gastos esta semana</div></div>`:ultimos}
    ${gastos.length>5?`<button class="btn-sec" onclick="sv('historial')">Ver historial →</button>`:""}`;
}

// ── GASTO CARD ──────────────────────────────
function gcard(g){
  const u2=state.perfiles[g.usuario]; const c=CATS.find(x=>x.id===g.categoria)||CATS[7];
  const splitTag=g.split?`<span class="gc-split">÷2</span>`:"";
  return `<div class="gc" style="border-color:${COL[g.usuario]}">
    <div class="gc-i">${c.i}</div>
    <div class="gc-inf">
      <div class="gc-d">${g.descripcion}${splitTag}</div>
      <div class="gc-m">${u2.emoji} ${u2.nombre} · ${c.l} · ${fmtD(g.fecha)}</div>
    </div>
    <div class="gc-r"><div class="gc-v" style="color:${COL[g.usuario]}">${fmt(g.monto)}</div>
      ${g.usuario===usuario?`<button class="gc-del" onclick="del('${g.id}')">🗑️</button>`:""}
    </div>
  </div>`;
}

// ── HISTORIAL ───────────────────────────────
function vHistorial(todos){
  const dI=state.settings.semanaInicia??4;
  const mapa={};
  todos.forEach(g=>{
    const f=new Date(g.fecha); let d=f.getDay()-dI; if(d<0)d+=7;
    const ini=new Date(f); ini.setDate(f.getDate()-d); ini.setHours(0,0,0,0);
    const k=keyIni(ini);
    if(!mapa[k])mapa[k]={ini,gastos:[]};
    mapa[k].gastos.push(g);
  });
  const sems=Object.entries(mapa).sort((a,b)=>new Date(b[0])-new Date(a[0]));
  if(!sems.length) return `<div class="empty"><div class="em-i">📭</div><div class="em-t">Sin gastos aún</div></div>`;
  const keyAct=keyIni(inicioSem(dI,0));
  const p=state.perfiles;
  return sems.map(([k,{ini,gastos}])=>{
    const fin=finSem(ini); const tot=gastos.reduce((s,g)=>s+g.monto,0);
    const mT=gastos.filter(g=>g.usuario==="manolo").reduce((s,g)=>s+g.monto,0);
    const eT=gastos.filter(g=>g.usuario==="esposa").reduce((s,g)=>s+g.monto,0);
    const esAct=k===keyAct;
    return `<div class="sem-blk">
      <div class="sem-hdr">
        ${esAct?`<span>📅 Esta semana</span>`:fmtR(ini,fin)}
        <span class="sem-tot">${fmt(tot)}</span>
      </div>
      <div class="sem-mini">
        <div class="sem-mini-card" style="background:#EFF6FF">
          <div class="sem-mini-n">${p.manolo.emoji} ${p.manolo.nombre}</div>
          <div class="sem-mini-v" style="color:#2563EB">${fmt(mT)}</div>
        </div>
        <div class="sem-mini-card" style="background:#FDF2F8">
          <div class="sem-mini-n">${p.esposa.emoji} ${p.esposa.nombre}</div>
          <div class="sem-mini-v" style="color:#DB2777">${fmt(eT)}</div>
        </div>
      </div>
      ${gastos.slice(0,3).map(gcard).join("")}
      ${gastos.length>3?`<div style="text-align:center;font-size:12px;color:#94a3b8;margin-top:-2px;margin-bottom:6px">+${gastos.length-3} más</div>`:""}
    </div><hr style="border:none;border-top:1px solid var(--c-border);margin:0 0 16px"/>`;
  }).join("");
}

// ── ANÁLISIS ────────────────────────────────
function vAnalisis(todos){
  // Mes seleccionado
  const hoy=new Date();
  const año=new Date(hoy.getFullYear(),hoy.getMonth()-mesOffset,1);
  const mesNom=MESES[año.getMonth()]+" "+año.getFullYear();
  const mesStr=`${año.getFullYear()}-${String(año.getMonth()+1).padStart(2,"0")}`;
  const delMes=todos.filter(g=>g.fecha.startsWith(mesStr));
  const totalMes=delMes.reduce((s,g)=>s+g.monto,0);
  const mT=delMes.filter(g=>g.usuario==="manolo").reduce((s,g)=>s+g.monto,0);
  const eT=delMes.filter(g=>g.usuario==="esposa").reduce((s,g)=>s+g.monto,0);
  const p=state.perfiles;

  // Por categoría
  const catTotals=CATS.map(c=>({...c,total:delMes.filter(g=>g.categoria===c.id).reduce((s,g)=>s+g.monto,0)}))
    .filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  // Últimos 6 meses para barra
  const meses6=Array.from({length:6},(_,i)=>{
    const m=new Date(hoy.getFullYear(),hoy.getMonth()-i,1);
    const str=`${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,"0")}`;
    const total=todos.filter(g=>g.fecha.startsWith(str)).reduce((s,g)=>s+g.monto,0);
    return {nom:MESES[m.getMonth()].substring(0,3),total,str};
  }).reverse();

  return `
    <!-- SELECTOR MES -->
    <div class="month-selector">
      <button class="ms-btn" onclick="setMesOffset(${mesOffset+1})">◀</button>
      <div class="ms-label">${mesNom}</div>
      <button class="ms-btn" onclick="setMesOffset(${Math.max(0,mesOffset-1)})"${mesOffset===0?" disabled style='opacity:.4'":""}>▶</button>
    </div>

    <!-- RESUMEN MES -->
    <div class="chart-card">
      <div class="chart-title">💰 Resumen de ${MESES[año.getMonth()]}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center">
        <div style="background:#f8fafc;border-radius:12px;padding:12px">
          <div style="font-size:11px;color:#64748b">Total</div>
          <div style="font-size:18px;font-weight:900;color:#1e293b">${fmt(totalMes)}</div>
        </div>
        <div style="background:#EFF6FF;border-radius:12px;padding:12px">
          <div style="font-size:11px;color:#64748b">${p.manolo.emoji} ${p.manolo.nombre}</div>
          <div style="font-size:18px;font-weight:900;color:#2563EB">${fmt(mT)}</div>
        </div>
        <div style="background:#FDF2F8;border-radius:12px;padding:12px">
          <div style="font-size:11px;color:#64748b">${p.esposa.emoji} ${p.esposa.nombre}</div>
          <div style="font-size:18px;font-weight:900;color:#DB2777">${fmt(eT)}</div>
        </div>
      </div>
    </div>

    <!-- GRÁFICA CATEGORÍAS -->
    ${catTotals.length>0?`
    <div class="chart-card">
      <div class="chart-title">🍕 Gastos por categoría</div>
      <div class="chart-wrap"><canvas id="chartCat"></canvas></div>
      <div style="margin-top:12px">
        ${catTotals.map(c=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:18px">${c.i}</span>
              <span style="font-size:13px;font-weight:600">${c.l}</span>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="background:#f1f5f9;border-radius:4px;height:6px;width:60px">
                <div style="background:${c.c};height:6px;border-radius:4px;width:${((c.total/totalMes)*100).toFixed(0)}%"></div>
              </div>
              <span style="font-size:13px;font-weight:800;color:${c.c};min-width:60px;text-align:right">${fmt(c.total)}</span>
            </div>
          </div>`).join("")}
      </div>
    </div>`:`<div class="empty"><div class="em-i">📊</div><div class="em-t">Sin gastos en ${MESES[año.getMonth()]}</div></div>`}

    <!-- ÚLTIMOS 6 MESES -->
    <div class="chart-card">
      <div class="chart-title">📅 Últimos 6 meses</div>
      <div class="chart-wrap"><canvas id="chartMes"></canvas></div>
    </div>`;
}

function renderCharts(todos){
  const hoy=new Date();
  const año=new Date(hoy.getFullYear(),hoy.getMonth()-mesOffset,1);
  const mesStr=`${año.getFullYear()}-${String(año.getMonth()+1).padStart(2,"0")}`;
  const delMes=todos.filter(g=>g.fecha.startsWith(mesStr));
  const catTotals=CATS.map(c=>({...c,total:delMes.filter(g=>g.categoria===c.id).reduce((s,g)=>s+g.monto,0)})).filter(c=>c.total>0);

  // Donut categorías
  const ctxCat=document.getElementById("chartCat");
  if(ctxCat&&catTotals.length>0){
    try{
      chartCat=new Chart(ctxCat,{
        type:"doughnut",
        data:{labels:catTotals.map(c=>c.l),datasets:[{data:catTotals.map(c=>c.total),backgroundColor:catTotals.map(c=>c.c),borderWidth:2,borderColor:"#fff"}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.raw)}`}}},cutout:"65%"}
      });
    }catch(e){}
  }

  // Bar últimos 6 meses
  const meses6=Array.from({length:6},(_,i)=>{
    const m=new Date(hoy.getFullYear(),hoy.getMonth()-i,1);
    const str=`${m.getFullYear()}-${String(m.getMonth()+1).padStart(2,"0")}`;
    return {nom:MESES[m.getMonth()].substring(0,3),
      manolo:todos.filter(g=>g.fecha.startsWith(str)&&g.usuario==="manolo").reduce((s,g)=>s+g.monto,0),
      esposa:todos.filter(g=>g.fecha.startsWith(str)&&g.usuario==="esposa").reduce((s,g)=>s+g.monto,0)};
  }).reverse();

  const ctxMes=document.getElementById("chartMes");
  if(ctxMes){
    try{
      chartMes=new Chart(ctxMes,{
        type:"bar",
        data:{labels:meses6.map(m=>m.nom),datasets:[
          {label:state.perfiles.manolo.nombre,data:meses6.map(m=>m.manolo),backgroundColor:"#93c5fd",borderRadius:6},
          {label:state.perfiles.esposa.nombre,data:meses6.map(m=>m.esposa),backgroundColor:"#f9a8d4",borderRadius:6}
        ]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{position:"bottom",labels:{usePointStyle:true,padding:16,font:{family:"Nunito",weight:"700"}}}},
          scales:{y:{ticks:{callback:v=>"$"+v.toLocaleString()},grid:{color:"#f1f5f9"}},x:{grid:{display:false}}}}
      });
    }catch(e){}
  }
}

// ── CONFIG ──────────────────────────────────

  return `

        <div class="sr"><div><div class="sr-l">Semana inicia el</div></div><div class="sr-v">${DIAS[dI]}</div></div>

// ── MODAL EMOJI ──────────────────────────────
function renderModal(){
  const k=emojiFor; const emojis=EMOJIS[k]||[]; const act=state.perfiles[k].emoji;
  return `<div class="mo" onclick="closeModal(event)">
    <div class="mb">
      <div class="mt">Avatar para ${state.perfiles[k].nombre}</div>
      <div class="eg">${emojis.map(e=>`<button class="eo${e===act?" sel":""}" onclick="selEmoji('${k}','${e}')">${e}</button>`).join("")}</div>
      <button class="mc" onclick="emojiFor=null;renderApp()">Cerrar</button>
    </div>
  </div>`;
}

// ── OCR ─────────────────────────────────────
window.triggerOCR=()=>{
  const input=document.getElementById("ocr-input");
  input.onchange=async e=>{
    const file=e.target.files[0]; if(!file)return;
    ocrLoading=true; renderApp();
    try{
      const b64=await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(",")[1]);
        r.onerror=rej;
        r.readAsDataURL(file);
      });
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:200,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:file.type,data:b64}},
            {type:"text",text:"Analiza esta foto de un ticket o recibo. Extrae ÚNICAMENTE el monto TOTAL a pagar (el número más grande o el que diga 'Total', 'TOTAL', 'A pagar', etc). Responde SOLO con el número, sin símbolo de moneda, sin texto adicional. Si no puedes encontrar un monto claro, responde: 0"}
          ]}]
        })
      });
      const data=await resp.json();
      const texto=data.content?.[0]?.text?.trim()||"0";
      const monto=parseFloat(texto.replace(/[^0-9.]/g,""));
      if(monto>0){
        ocrLoading=false; renderApp();
        setTimeout(()=>{
          const inp=document.getElementById("im");
          if(inp){inp.value=monto;chkF();toast(`📷 Detectado: ${fmt(monto)}`,"#10b981");}
        },100);
      } else {
        ocrLoading=false; renderApp(); toast("No se detectó monto en la imagen","#f59e0b");
      }
    }catch(err){
      ocrLoading=false; renderApp(); toast("Error al procesar la imagen","#ef4444");
    }
    input.value="";
  };
  input.click();
};

// ── ACTIONS ─────────────────────────────────
window.cambU=()=>{usuario=null;render();};
window.sv=v=>{vista=v;if(v!=="analisis"){mesOffset=0;}renderApp();};
window.setAj=a=>{ajuste=a;renderApp();};
window.setCat=c=>{cat=c;renderApp();};
window.toggleSplit=()=>{splitActivo=!splitActivo;renderApp();};
window.setMesOffset=o=>{mesOffset=o;renderApp();};
window.chkF=()=>{
  const m=document.getElementById("im")?.value;
  const d=document.getElementById("id2")?.value?.trim();
  const b=document.getElementById("bg"); if(b)b.disabled=!(m&&parseFloat(m)>0&&d);
};
window.camPres=async delta=>{
  state.settings.presupuesto=Math.max(0,(state.settings.presupuesto??4000)+delta);
  await save(); toast(`${delta>0?"➕":"➖"} Presupuesto: ${fmt(state.settings.presupuesto)}`,delta>0?"#10b981":"#f59e0b");
};
window.agregar=async()=>{
  if(saving)return;
  const monto=parseFloat(document.getElementById("im")?.value);
  const desc=document.getElementById("id2")?.value?.trim();
  if(!monto||!desc)return; saving=true;
  const fecha=new Date().toISOString();
  if(splitActivo){
    // Crear dos gastos, uno por cada usuario, con la mitad
    const mitad=Math.round((monto/2)*10)/10;
    ["manolo","esposa"].forEach(u=>{
      state.gastos["g"+Date.now()+u]={usuario:u,monto:mitad,descripcion:desc,categoria:cat,fecha,split:true};
    });
    toast(`✅ ${fmt(monto)} dividido (${fmt(mitad)} c/u)`);
  } else {
    state.gastos["g"+Date.now()]={usuario,monto,descripcion:desc,categoria:cat,fecha};
    toast(`✅ ${fmt(monto)} registrado`);
  }
  await save(); saving=false; splitActivo=false; vista="home"; renderApp();
};
window.del=async id=>{
  if(!confirm("¿Eliminar este gasto?"))return;
  delete state.gastos[id]; await save(); toast("🗑️ Eliminado","#ef4444");
};
window.setDia=async i=>{
  state.settings.semanaInicia=i; await save(); toast(`📅 Semana inicia el ${DIAS[i]}`);
};
window.savePerfil=async k=>{
  const n=document.getElementById(`pn-${k}`)?.value?.trim();
  if(!n)return; state.perfiles[k].nombre=n; await save(); toast(`✅ Nombre: ${n}`);
};
window.saveMeta=async()=>{
  const v=parseFloat(document.getElementById("inp-meta")?.value)||0;
  state.settings.metaAhorro=v; await save();
  toast(v>0?`🎯 Meta: ${fmt(v)}`:"Meta eliminada");
};
window.openModal=k=>{emojiFor=k;renderApp();};
window.closeModal=e=>{if(e.target.classList.contains("mo")){emojiFor=null;renderApp();}};
window.selEmoji=async(k,e)=>{state.perfiles[k].emoji=e;await save();emojiFor=null;toast("✅ Avatar actualizado");};
window.pedirNotif=pedirNotif;

function toast(msg,color="#10b981"){
  const el=document.getElementById("toast"); if(!el)return;
  el.textContent=msg; el.style.background=color;
  el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),2500);
}
</script>
