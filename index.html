<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',system-ui,sans-serif;background:#F0F4FF;color:#1e293b;}
:root{--uc:#2563EB;--ul:#EFF6FF;--bo:#e2e8f0;--sh:0 4px 20px rgba(0,0,0,.08);--ra:18px;}
#app{max-width:480px;margin:0 auto;min-height:100vh;}

/* LOGIN — siempre visible desde el primer render */
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:32px 24px;
  background:linear-gradient(160deg,#dbeafe 0%,#fce7f3 100%);}
.ltitle{font-size:30px;font-weight:900;letter-spacing:-1px;margin:10px 0 4px;text-align:center;}
.lsub{font-size:14px;color:#64748b;margin-bottom:36px;text-align:center;}
.lcards{display:flex;gap:16px;}
.lc{background:#fff;border-radius:24px;padding:28px 24px;text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,.12);border:3px solid;
  font-family:'Nunito',sans-serif;font-size:17px;font-weight:800;
  cursor:pointer;-webkit-appearance:none;appearance:none;
  touch-action:manipulation;min-width:120px;display:block;}
.lc span{display:block;}
.lc .e{font-size:52px;line-height:1.3;}
.lhint{margin-top:24px;font-size:12px;color:#94a3b8;text-align:center;}
#spin{display:flex;flex-direction:column;align-items:center;gap:12px;color:#64748b;font-size:14px;margin-top:20px;}
.spin{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#2563EB;border-radius:50%;animation:rot .8s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}

/* APP */
#hdr{color:#fff;padding:20px 18px 22px;}
.htop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.hbadge{background:rgba(255,255,255,.2);border-radius:50px;padding:3px 10px;font-size:11px;display:inline-block;font-weight:600;margin-top:5px;}
.hroll{background:#f59e0b;border-radius:50px;padding:3px 10px;font-size:11px;display:inline-block;font-weight:700;margin-left:6px;margin-top:5px;}
.bcam{background:rgba(255,255,255,.2);border:none;color:#fff;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;touch-action:manipulation;}
.hmonto{font-size:52px;font-weight:900;letter-spacing:-2px;line-height:1;text-align:center;}
.hsub{font-size:13px;opacity:.75;margin-top:6px;text-align:center;}
.barw{background:rgba(255,255,255,.25);border-radius:50px;height:8px;margin:12px 0 14px;}
.barf{height:8px;border-radius:50px;}
.ctrl{background:rgba(0,0,0,.15);border-radius:16px;padding:14px;}
.ajrow{display:flex;gap:6px;margin-bottom:8px;}
.aj{flex:1;padding:7px 2px;border:2px solid rgba(255,255,255,.3);border-radius:10px;background:transparent;color:#fff;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;touch-action:manipulation;}
.aj.on{border-color:#fff;background:rgba(255,255,255,.25);font-weight:900;}
.pmrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.pm{padding:12px;border:2px solid rgba(255,255,255,.3);border-radius:14px;color:#fff;cursor:pointer;font-size:15px;font-weight:800;font-family:inherit;touch-action:manipulation;}

#tabs{display:flex;background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.04);overflow-x:auto;-webkit-overflow-scrolling:touch;}

#view{padding:16px 16px 90px;}

.alert{border-radius:16px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.aw{background:linear-gradient(135deg,#fef3c7,#fde68a);}
.ad{background:linear-gradient(135deg,#fee2e2,#fca5a5);}
.an{background:linear-gradient(135deg,#d1fae5,#6ee7b7);}

.balc{border-radius:16px;padding:15px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}

.ucards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}

.mbw{background:#f1f5f9;border-radius:50px;height:4px;margin-top:8px;}
.mbf{height:4px;border-radius:50px;}
.st{font-size:14px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}

.gcr{text-align:right;flex-shrink:0;}
.gcv{font-size:17px;font-weight:900;}
.gcdel{background:none;border:none;cursor:pointer;font-size:15px;display:block;margin-top:2px;touch-action:manipulation;}

.semb{margin-bottom:22px;}
.semmini{display:flex;gap:8px;margin-bottom:10px;}

.msel{display:flex;align-items:center;gap:8px;margin-bottom:16px;}

.fincard{background:#fff;border-radius:16px;padding:18px;box-shadow:var(--sh);margin-bottom:16px;}
.brcard{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-radius:16px;padding:18px;margin-bottom:16px;text-align:center;}
.brmonto{font-size:42px;font-weight:900;color:#1d4ed8;letter-spacing:-2px;margin:4px 0;}

.brd{background:rgba(255,255,255,.7);border-radius:12px;padding:10px;text-align:center;}

.rias{background:#f8fafc;border-radius:10px;padding:10px;text-align:center;}

.fcard{background:#fff;border-radius:22px;padding:22px;box-shadow:var(--sh);}
input[type=number],input[type=text]{width:100%;border:2px solid #e2e8f0;border-radius:12px;padding:12px 14px;font-size:16px;outline:none;background:#f8fafc;font-family:inherit;}
input:focus{border-color:var(--uc);background:#fff;}
.inpm{font-size:38px!important;text-align:center;font-weight:900!important;}
.flbl{display:block;font-size:12px;font-weight:800;color:#374151;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.cg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.cb{padding:10px 4px;border:2px solid #e2e8f0;border-radius:12px;background:#fff;cursor:pointer;font-size:11px;color:#374151;font-family:inherit;font-weight:600;touch-action:manipulation;}

.cb span{font-size:22px;display:block;margin-bottom:2px;}
.splitrow{display:flex;align-items:center;justify-content:space-between;background:#f0fdf4;border-radius:12px;padding:12px 14px;margin-top:14px;border:2px solid #bbf7d0;cursor:pointer;touch-action:manipulation;}
.splitrow.on{background:#dcfce7;border-color:#4ade80;}
.stgl{width:44px;height:24px;background:#ccc;border-radius:50px;position:relative;flex-shrink:0;}
.stgl.on{background:#22c55e;}
.stgl::after{content:"";width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;box-shadow:0 1px 3px rgba(0,0,0,.2);}

.ocrbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:2px dashed #e2e8f0;border-radius:12px;background:#f8fafc;cursor:pointer;font-size:13px;font-weight:700;color:#64748b;font-family:inherit;margin-top:12px;touch-action:manipulation;}

#ocrin{display:none;}
.btng{width:100%;margin-top:16px;padding:15px;font-size:16px;font-weight:900;color:#fff;border:none;border-radius:14px;cursor:pointer;background:var(--uc);font-family:inherit;touch-action:manipulation;}
.btng:disabled{opacity:.4;}

.ss{margin-bottom:20px;}
.sst{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#64748b;margin-bottom:10px;}
.scard{background:#fff;border-radius:16px;padding:18px;box-shadow:var(--sh);}
.pe{display:flex;align-items:center;gap:14px;padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid #e2e8f0;}

.peeb{font-size:44px;background:#F0F4FF;border:none;border-radius:14px;padding:8px 10px;cursor:pointer;flex-shrink:0;line-height:1;touch-action:manipulation;}
.peni{width:100%;border:2px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:15px;font-weight:700;font-family:inherit;background:#f8fafc;outline:none;}
.pesv{margin-top:6px;border:none;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;color:#fff;touch-action:manipulation;}
.dg{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px;}
.db{padding:8px 2px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;cursor:pointer;font-size:11px;font-weight:700;color:#64748b;font-family:inherit;touch-action:manipulation;}
.db.on{border-color:var(--uc);background:var(--ul);color:var(--uc);}
.sr{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #e2e8f0;}
.sr:last-child{border-bottom:none;}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.mobox{background:#fff;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:480px;}
.eg{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.eo{font-size:32px;background:#F0F4FF;border:2px solid transparent;border-radius:12px;padding:8px;cursor:pointer;text-align:center;touch-action:manipulation;}
.eo.sel{border-color:var(--uc);background:var(--ul);}
.moc{width:100%;margin-top:16px;padding:13px;background:#f1f5f9;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;touch-action:manipulation;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);color:#fff;padding:11px 22px;border-radius:50px;font-size:14px;font-weight:700;z-index:999;box-shadow:0 6px 24px rgba(0,0,0,.2);white-space:nowrap;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:48px 0;color:#94a3b8;}
.recitem{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #e2e8f0;}
.recitem:last-child{border-bottom:none;}

/* ── NEW FEATURES ── */
.splitrow{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;border-radius:12px;padding:12px 14px;margin-top:10px;border:2px solid #e2e8f0;cursor:pointer;touch-action:manipulation;}

.frecg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}

.btnpill{background:#111827;color:#fff;border:none;border-radius:999px;padding:9px 12px;font-size:12px;font-weight:900;cursor:pointer;font-family:inherit;touch-action:manipulation;}
.btnpill.sec{background:#f1f5f9;color:#334155;}
</style></head>

<body>
<div id="app">
  <div id="login">
    <div style="font-size:64px;line-height:1">&#x1F491;</div>
    <div class="ltitle">Gastos Pareja</div>
    <div class="lsub">&#xBF;Qui&#xE9;n va a registrar?</div>
    <div class="lcards">
      <button class="lc" id="bm" style="border-color:#2563EB">
        <span class="e">&#x1F468;</span>
        <span style="color:#2563EB">Manolo</span>
      </button>
      <button class="lc" id="be" style="border-color:#DB2777">
        <span class="e">&#x1F469;</span>
        <span style="color:#DB2777">Esposa</span>
      </button>
    </div>
    <div id="spin" style="display:none"><div class="spin"></div><span>Cargando datos...</span></div>
    <div class="lhint">&#x1F4F1; Sincronizado en tiempo real</div>
  </div>
</div>
<div id="toast"></div>
<input type="file" id="ocrin" accept="image/*" capture="environment"/>
<script>

// ── LOGIN BUTTONS ──
document.getElementById("bm").addEventListener("touchend",function(e){e.preventDefault();elegir("manolo");});
document.getElementById("be").addEventListener("touchend",function(e){e.preventDefault();elegir("esposa");});
document.getElementById("bm").addEventListener("click",function(){elegir("manolo");});
document.getElementById("be").addEventListener("click",function(){elegir("esposa");});

var usuarioSeleccionado=null;
function elegir(k){
  if(usuarioSeleccionado)return;
  usuarioSeleccionado=k;
  document.getElementById("bm").disabled=true;
  document.getElementById("be").disabled=true;
  document.getElementById("spin").style.display="flex";
  iniciarFirebase(k);
}

// ── FIREBASE ──
var FC={
  apiKey:"AIzaSyAx0ILxze_MTBEoElQSvJEjHwaHjC9Uqkg",
  authDomain:"gastos-7adfd.firebaseapp.com",
  databaseURL:"https://gastos-7adfd-default-rtdb.firebaseio.com",
  projectId:"gastos-7adfd",
  storageBucket:"gastos-7adfd.firebasestorage.app",
  messagingSenderId:"562517695534",
  appId:"1:562517695534:web:ce38c380a7bce4215293bf"
};
var db=null;

function iniciarFirebase(k){
  firebase.initializeApp(FC);
  db=firebase.database();
  db.ref("gastos-pareja").once("value",function(snap){
    if(snap.exists()){
      var v=snap.val();
      if(v.settings)ST.settings=Object.assign({},ST.settings,v.settings);
      if(v.perfiles)ST.perfiles=v.perfiles;
      if(v.finanzas)ST.finanzas=v.finanzas;
      ST.gastos=v.gastos||{};
      ST.rollovers=v.rollovers||{};
      ST.ultimaSemana=v.ultimaSemana||null;
      ST.ultimoMes=v.ultimoMes||null;
      ST.resumenesMensuales=v.resumenesMensuales||{};
      ST.frecuentes=v.frecuentes||[];
      ST.invitaciones=v.invitaciones||{};
      ST.reacciones=v.reacciones||{};
      ST.deudas=v.deudas||[];
      ST.autoadds=v.autoadds||{};
    }
    usuario=k;
    var col=k==="manolo"?"#2563EB":"#DB2777";
    var light=k==="manolo"?"#EFF6FF":"#FDF2F8";
    document.documentElement.style.setProperty("--uc",col);
    document.documentElement.style.setProperty("--ul",light);
    // Update login buttons with saved names
    var bm2=document.getElementById("bm"),be2=document.getElementById("be");
    if(bm2){var s1=bm2.querySelectorAll("span");if(s1[0])s1[0].textContent=ST.perfiles.manolo.emoji;if(s1[1])s1[1].textContent=ST.perfiles.manolo.nombre;}
    if(be2){var s2=be2.querySelectorAll("span");if(s2[0])s2[0].textContent=ST.perfiles.esposa.emoji;if(s2[1])s2[1].textContent=ST.perfiles.esposa.nombre;}
    checkSemana();checkMes();renderApp();
    db.ref("gastos-pareja").on("value",function(snap2){
      if(!fbGuard&&snap2.exists()){
        var v2=snap2.val();
        if(v2.settings)ST.settings=Object.assign({},ST.settings,v2.settings);
        if(v2.perfiles)ST.perfiles=v2.perfiles;
        if(v2.finanzas)ST.finanzas=v2.finanzas;
        ST.gastos=v2.gastos||{};
        ST.rollovers=v2.rollovers||{};
        ST.resumenesMensuales=v2.resumenesMensuales||{};
        ST.frecuentes=v2.frecuentes||[];
        ST.invitaciones=v2.invitaciones||{};
        ST.reacciones=v2.reacciones||{};
        ST.deudas=v2.deudas||[];
        ST.autoadds=v2.autoadds||{};
        renderApp();
      }
    });
  });
}

// ── CONSTANTS ──
var EMOJIS={
  manolo:["👨","🧔","👦","👨‍💼","🧑","🤠","😎","🥷","👻","🐻","🦁","🐯","🐸","🎮","🚀","⚡"],
  esposa:["👩","👧","👩‍💼","👩‍🦱","💁‍♀️","🧖‍♀️","🌸","🦋","🐱","🌺","👸","🧚‍♀️","🦄","🌙","💅","🎀"]
};
var COL={manolo:"#2563EB",esposa:"#DB2777"};
var CATS=[
  {id:"super",l:"Súper",i:"🛒",c:"#3b82f6"},{id:"renta",l:"Renta",i:"🏠",c:"#8b5cf6"},
  {id:"comida",l:"Comida",i:"🍽️",c:"#f59e0b"},{id:"trans",l:"Transporte",i:"🚗",c:"#10b981"},
  {id:"salud",l:"Salud",i:"💊",c:"#ef4444"},{id:"ocio",l:"Ocio",i:"🎉",c:"#ec4899"},
  {id:"ropa",l:"Ropa",i:"👕",c:"#f97316"},{id:"otro",l:"Otro",i:"📦",c:"#94a3b8"}
];
var DIAS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
var MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var AJS=[100,200,500,1000];
var REACTS=["😱","👀","🤔","😅","🙌","❤️"];

var fmt=function(n){return new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",minimumFractionDigits:0}).format(n);};
var fmtD=function(iso){return new Date(iso).toLocaleDateString("es-MX",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});};
var fmtR=function(a,b){return a.toLocaleDateString("es-MX",{day:"2-digit",month:"short"})+" – "+b.toLocaleDateString("es-MX",{day:"2-digit",month:"short"});};
function iniSem(dI,off){off=off||0;var h=new Date();var d=h.getDay()-dI;if(d<0)d+=7;var i=new Date(h);i.setDate(h.getDate()-d-(off*7));i.setHours(0,0,0,0);return i;}
function finSem(i){var f=new Date(i);f.setDate(i.getDate()+6);f.setHours(23,59,59,999);return f;}
function keyI(i){return i.toISOString().split("T")[0];}
function mesKey(){var h=new Date();return h.getFullYear()+"-"+String(h.getMonth()+1).padStart(2,"0");}
function semsEnMes(y,m){return Math.ceil(new Date(y,m+1,0).getDate()/7);}

function checkSemana(){
  var dI=ST.settings.semanaInicia||4,kHoy=keyI(iniSem(dI,0));
  esSemNueva=false;rolloverVal=0;
  if(ST.ultimaSemana&&ST.ultimaSemana!==kHoy){
    esSemNueva=true;
    var iAnt=iniSem(dI,1),fAnt=finSem(iAnt),kAnt=keyI(iAnt);
    var gastAnt=Object.values(ST.gastos||{}).filter(function(g){var f=new Date(g.fecha);return f>=iAnt&&f<=fAnt;}).reduce(function(s,g){return s+g.monto;},0);
    var sob=(ST.settings.presupuesto||4000)+(ST.rollovers[kAnt]||0)-gastAnt;
    if(sob>0&&!ST.rollovers[kHoy]){rolloverVal=Math.round(sob);ST.rollovers[kHoy]=rolloverVal;}
  }
  if(kHoy!==ST.ultimaSemana)ST.ultimaSemana=kHoy;
}

function autoRegistrarFijos(mc){
  var recs=(ST.finanzas&&ST.finanzas.gastosRecurrentes)||[];
  if(!recs.length)return;
  if(!ST.autoadds)ST.autoadds={};
  if(ST.autoadds[mc])return;
  var h=new Date(),f=new Date(h.getFullYear(),h.getMonth(),1).toISOString();
  var n=0;
  recs.forEach(function(r){
    var gid="gauto_"+mc+"_"+r.nombre.replace(/[^a-zA-Z0-9]/g,"");
    if(!ST.gastos[gid]){
      ST.gastos[gid]={usuario:"manolo",monto:r.monto,descripcion:r.nombre,categoria:"renta",fecha:f,auto:true};
      n++;
    }
  });
  if(n>0){ST.autoadds[mc]=true;saveDB();toast("📅 "+n+" gasto"+(n>1?"s fijos":"fijo")+" auto-registrado"+(n>1?"s":""),"#8b5cf6");}
}

async function generarResumen(mStr){
  if(generandoResumen||!db)return;
  generandoResumen=true;
  var todos=Object.values(ST.gastos||{});
  var del=todos.filter(function(g){return g.fecha.startsWith(mStr);});
  if(!del.length){generandoResumen=false;return;}
  var tot=del.reduce(function(s,g){return s+g.monto;},0);
  var mT=del.filter(function(g){return g.usuario==="manolo";}).reduce(function(s,g){return s+g.monto;},0);
  var eT=del.filter(function(g){return g.usuario==="esposa";}).reduce(function(s,g){return s+g.monto;},0);
  var cm={};del.forEach(function(g){cm[g.categoria]=(cm[g.categoria]||0)+g.monto;});
  var top=Object.entries(cm).sort(function(a,b){return b[1]-a[1];}).slice(0,3)
    .map(function(e){return(CATS.find(function(c){return c.id===e[0];})||{l:e[0]}).l+": "+fmt(e[1]);}).join(", ");
  var pts=mStr.split("-"),p=ST.perfiles;
  try{
    var r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,
        messages:[{role:"user",content:"Eres asesor financiero para una pareja mexicana. Resumen de "+MESES[parseInt(pts[1])-1]+" "+pts[0]+". Máximo 5 líneas, tono cálido, emojis, sin markdown.\n\nDatos:\n- Total: "+fmt(tot)+"\n- "+p.manolo.nombre+": "+fmt(mT)+" | "+p.esposa.nombre+": "+fmt(eT)+"\n- Top: "+top}]})});
    var data=await r.json();
    var texto=(data.content&&data.content[0]&&data.content[0].text)||"";
    if(texto){if(!ST.resumenesMensuales)ST.resumenesMensuales={};ST.resumenesMensuales[mStr]={texto:texto,totalMes:tot,mT:mT,eT:eT};await saveDB();}
  }catch(e){console.error(e);}
  generandoResumen=false;
}

function calcPres(){
  var f=ST.finanzas;if(!f.ingresoMensual)return null;
  var rec=(f.gastosRecurrentes||[]).reduce(function(s,r){return s+r.monto;},0);
  var disp=f.ingresoMensual-rec,h=new Date(),sems=semsEnMes(h.getFullYear(),h.getMonth());
  return{disp:disp,rec:rec,porSem:Math.round(disp/sems),sems:sems};
}

// ── CALC DIARIO ──
function calcDiario(semGastos,presTot){
  var h=new Date(),dI=ST.settings.semanaInicia||4;
  var iniS=iniSem(dI,0);
  var diaEnSem=Math.max(0,Math.floor((h-iniS)/86400000));
  var diasRest=Math.max(1,7-diaEnSem);
  var hI=new Date(h);hI.setHours(0,0,0,0);var hF=new Date(h);hF.setHours(23,59,59,999);
  var gastHoy=semGastos.filter(function(g){var f=new Date(g.fecha);return f>=hI&&f<=hF;}).reduce(function(s,g){return s+g.monto;},0);
  var dispSem=presTot-semGastos.reduce(function(s,g){return s+g.monto;},0);
  var presHoy=Math.round(dispSem/diasRest);
  var dispHoy=presHoy-gastHoy;
  var pct=Math.min((gastHoy/Math.max(presHoy,1))*100,100);
  return{presHoy:presHoy,gastHoy:gastHoy,dispHoy:Math.round(dispHoy),pct:pct,diasRest:diasRest,diaEnSem:diaEnSem,diaNom:DIAS[h.getDay()]};
}


// ── HOME INTEL HELPERS ──
function ymFromKey(k){
  var p=(k||"").split("-");
  return{y:parseInt(p[0]||"0"),m:parseInt(p[1]||"1"),m0:Math.max(0,parseInt(p[1]||"1")-1)};
}
function prevMonthKey(k){
  var o=ymFromKey(k);var y=o.y,m=o.m0;
  m-=1;if(m<0){m=11;y-=1;}
  return y+"-"+String(m+1).padStart(2,"0");
}
function daysInMonth(y,m0){return new Date(y,m0+1,0).getDate();}
function sumMonto(arr){return (arr||[]).reduce(function(s,g){return s+(g.monto||0);},0);}
function monthStats(todos,monthKey){
  var o=ymFromKey(monthKey),dim=daysInMonth(o.y,o.m0);
  var isCur=monthKey===mesKey();
  var today=new Date();
  var daysElapsed=isCur?Math.max(1,Math.min(today.getDate(),dim)):dim;
  var daysLeft=Math.max(0,dim-daysElapsed);
  var list=(todos||[]).filter(function(g){return (g.fecha||"").startsWith(monthKey);});
  var total=sumMonto(list);
  var factor=isCur?(dim/daysElapsed):1;
  var byCat={},byCatProj={},byUser={manolo:0,esposa:0};
  CATS.forEach(function(c){byCat[c.id]=0;byCatProj[c.id]=0;});
  list.forEach(function(g){
    var c=(g.categoria||"otro");if(byCat[c]==null){byCat[c]=0;byCatProj[c]=0;}
    byCat[c]+=g.monto||0;
    byUser[g.usuario]=(byUser[g.usuario]||0)+(g.monto||0);
  });
  Object.keys(byCat).forEach(function(k){byCatProj[k]=Math.round(byCat[k]*factor);});
  return{
    key:monthKey,dim:dim,daysElapsed:daysElapsed,daysLeft:daysLeft,
    list:list,total:total,projTotal:Math.round(total*factor),
    byCat:byCat,byCatProj:byCatProj,byUser:byUser
  };
}
function monthlyBudgetForDays(days){
  var w=ST.settings.presupuesto||4000;
  return Math.round(w*(days/7));
}
function fmtPct(x){return (Math.round(x*10)/10).toFixed(1)+"%";}
function escapeHtml(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/\'/g,"&#039;");
}


// Promedio gasto por día de la semana (por fechas únicas)
function dowAverages(todos,daysBack){
  var end=new Date();end.setHours(23,59,59,999);
  var start=new Date(end.getTime()-Math.max(1,daysBack)*86400000);
  start.setHours(0,0,0,0);
  var perDate={};
  (todos||[]).forEach(function(g){
    var d=new Date(g.fecha);if(!(d>=start&&d<=end))return;
    var k=d.toISOString().split("T")[0];
    perDate[k]=(perDate[k]||0)+(g.monto||0);
  });
  var sums=[0,0,0,0,0,0,0],cnt=[0,0,0,0,0,0,0];
  Object.keys(perDate).forEach(function(k){
    var d=new Date(k+"T00:00:00");
    var dow=d.getDay();
    sums[dow]+=perDate[k];
    cnt[dow]+=1;
  });
  var avgs=sums.map(function(s,i){return cnt[i]?s/cnt[i]:0;});
  var best=0;for(var i=1;i<7;i++){if(avgs[i]>avgs[best])best=i;}
  return{avgs:avgs,bestDow:best,bestAvg:avgs[best],countDays:cnt[best]};
}

function bPatrones(todos){
  if(!todos||!todos.length)return "";
  var cur=mesKey(),prev=prevMonthKey(cur);
  var a=monthStats(todos,cur),b=monthStats(todos,prev);
  if(a.total<=0 && b.total<=0)return "";
  // Categoría con mayor aumento (proyección vs mes pasado)
  var bestCat=null,bestDelta=0;
  CATS.forEach(function(c){
    var d=(a.byCatProj[c.id]||0)-(b.byCat[c.id]||0);
    if(d>bestDelta){bestDelta=d;bestCat=c;}
  });
  // Día más caro (últimas 8 semanas)
  var dw=dowAverages(todos,56);
  // Gasto grande (últimos 30 días)
  var end=new Date();end.setHours(23,59,59,999);
  var start=new Date(end.getTime()-30*86400000);start.setHours(0,0,0,0);
  var big=null;
  todos.forEach(function(g){
    var d=new Date(g.fecha);if(!(d>=start&&d<=end))return;
    if(!big||g.monto>big.monto)big=g;
  });

  var li=[];
  if(bestCat && bestDelta>0){
    var base=(b.byCat[bestCat.id]||0);
    var pct=base>0?(bestDelta/base*100):null;
    li.push('📌 <b>'+bestCat.i+' '+bestCat.l+'</b> va subiendo: '+fmt(bestDelta)+(pct?(' ('+Math.round(pct)+'%)'):'')+' vs mes pasado.');
  }else{
    li.push('📌 No hay una categoría “disparada” vs el mes pasado (bien controlado).');
  }
  if(dw.bestAvg>0){
    li.push('🗓️ El día más caro suele ser <b>'+DIAS[dw.bestDow]+'</b> (~'+fmt(Math.round(dw.bestAvg))+' por '+DIAS[dw.bestDow]+').');
  }
  if(big){
    var c=CATS.find(function(x){return x.id===big.categoria;})||{i:"📦",l:"Otro"};
    li.push('⚡ Ojo con el gasto más grande (últimos 30 días): <b>'+fmt(big.monto)+'</b> en '+c.i+' '+c.l+' (“'+escapeHtml((big.descripcion||"").slice(0,40))+'”).');
  }
  return '<div style="background:#fff;border-radius:16px;padding:16px 18px;margin-bottom:14px;box-shadow:var(--sh);border-top:4px solid #0ea5e9">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+
      '<div style="font-size:14px;font-weight:900">🧠 Patrones automáticos</div>'+
      '<div style="font-size:11px;color:#64748b">Auto</div>'+
    '</div>'+
    '<div style="font-size:13px;line-height:1.7;color:#374151">'+li.map(function(x){return "• "+x;}).join("<br/>")+'</div>'+
  '</div>';
}

function bGamificacion(semGastos,todos,pres,tot){
  var meta=ST.settings.metaAhorro||0;
  var ah=Math.max(0,pres-tot);
  var prog=meta>0?Math.min(ah/meta,1):Math.min((pres-tot)/Math.max(pres,1),1);
  var lvl=prog>=1?{t:"🏆 Meta lograda",d:"¡Se ganaron el badge de la semana!"}:
          prog>=0.75?{t:"🔥 Casi",d:"Van muy cerca. Un empujón y cae la meta."}:
          prog>=0.5?{t:"💪 En ritmo",d:"Buen control. Eviten fugas y llegan."}:
          prog>=0.25?{t:"🙂 Arrancando",d:"Aún hay margen, pero ojo con los impulsos."}:
                    {t:"🧊 A calentar",d:"Esta semana necesita un plan."};

  // Racha de semanas cumpliendo meta (solo semanas completas anteriores)
  var streak=0;
  if(meta>0){
    var dI=ST.settings.semanaInicia||4;
    for(var off=1;off<=12;off++){
      var i=iniSem(dI,off),f=finSem(i);
      var t=Object.values(ST.gastos||{}).filter(function(g){var d=new Date(g.fecha);return d>=i&&d<=f;}).reduce(function(s,g){return s+g.monto;},0);
      var sav=Math.max(0,(ST.settings.presupuesto||4000)-t);
      if(sav>=meta){streak++;}else break;
    }
  }

  // Reto automático: bajar 10% la categoría más grande de la semana pasada (si existe)
  var reto="";
  var dI2=ST.settings.semanaInicia||4;
  var iAnt=iniSem(dI2,1),fAnt=finSem(iAnt);
  var ant=Object.values(ST.gastos||{}).filter(function(g){var d=new Date(g.fecha);return d>=iAnt&&d<=fAnt;});
  if(ant.length){
    var by={};CATS.forEach(function(c){by[c.id]=0;});
    ant.forEach(function(g){by[g.categoria]=(by[g.categoria]||0)+(g.monto||0);});
    var best=null,bv=0;
    CATS.forEach(function(c){if(c.id==="renta")return;var v=by[c.id]||0;if(v>bv){bv=v;best=c;}});
    if(best && bv>0){
      var target=Math.round(bv*0.9);
      var cur=semGastos.filter(function(g){return g.categoria===best.id;}).reduce(function(s,g){return s+g.monto;},0);
      var prog2=Math.max(0,Math.min((target-cur)/Math.max(target,1),1));
      var bar=Math.round(prog2*100);
      reto='<div style="margin-top:10px;background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:10px 12px">'+

        '</div>'+

  }

  var title=meta>0?('🎮 Gamificación (meta '+fmt(meta)+')'):'🎮 Gamificación (sin meta)';

function calcScore(pres,tot,meta,mT,eT,totPas){
  var over=Math.max(0,tot-pres);
  var scoreBudget=tot<=pres?40:Math.max(0,40-Math.min((over/Math.max(pres,1))*80,40));
  var sav=Math.max(0,pres-tot);
  var scoreSavings=meta>0?20*Math.min(sav/Math.max(meta,1),1):20*Math.min(sav/Math.max(pres,1),1);
  var scoreBalance=20*(1-Math.min(Math.abs(mT-eT)/Math.max(pres,1),1));
  var scoreTrend=10;
  if(totPas>0){
    scoreTrend=tot<=totPas?20:20*(1-Math.min((tot-totPas)/totPas,1));
  }else if(tot>0){
    scoreTrend=12;
  }
  var total=Math.round(scoreBudget+scoreSavings+scoreBalance+scoreTrend);
  return{
    total:total,
    parts:{
      presupuesto:Math.round(scoreBudget),
      ahorro:Math.round(scoreSavings),
      balance:Math.round(scoreBalance),
      tendencia:Math.round(scoreTrend)
    }
  };
}
function scoreLabel(s){
  if(s>=85)return"Excelente";
  if(s>=70)return"Muy bien";
  if(s>=55)return"Bien";
  return"Ajustemos";
}
function bScore(todos,pres,tot,mT,eT,totPas){
  if((todos||[]).length===0)return "";
  var sc=calcScore(pres,tot,ST.settings.metaAhorro||0,mT,eT,totPas);

  return '<div style="background:#fff;border-radius:16px;padding:16px 18px;margin-bottom:14px;box-shadow:var(--sh);border-top:4px solid '+col+'">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'+

// ── HISTORIAL con búsqueda ──
function bHistorial(todos){
  var dI=ST.settings.semanaInicia||4,p=ST.perfiles;

  // Filtrar por búsqueda
  var filtrados=histBusqueda?todos.filter(function(g){
    var q=histBusqueda.toLowerCase();
    var cl=(CATS.find(function(c){return c.id===g.categoria;})||{l:""}).l.toLowerCase();
    return (g.descripcion||"").toLowerCase().includes(q)||cl.includes(q)||
           (g.nota||"").toLowerCase().includes(q)||
           (p[g.usuario]&&p[g.usuario].nombre.toLowerCase().includes(q));
  }):todos;

  var totalHist=filtrados.reduce(function(s,g){return s+g.monto;},0);

  // Agrupar por semana
  var mp={};
  filtrados.forEach(function(g){var f=new Date(g.fecha);var dd=f.getDay()-dI;if(dd<0)dd+=7;
    var ini=new Date(f);ini.setDate(f.getDate()-dd);ini.setHours(0,0,0,0);
    var k=keyI(ini);if(!mp[k])mp[k]={ini:ini,gastos:[]};mp[k].gastos.push(g);});
  var sems=Object.entries(mp).sort(function(a,b){return new Date(b[0])-new Date(a[0]);});

  var searchBar='<div style="background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:14px;box-shadow:var(--sh)">'+
    '<input type="text" id="hist-search" value="'+histBusqueda.replace(/"/g,"&quot;")+'" placeholder="🔍 Buscar descripción, categoría, persona..." style="width:100%;border:2px solid #e2e8f0;border-radius:10px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;background:#f8fafc"/>'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">'+
      '<div style="font-size:12px;color:#64748b">'+filtrados.length+' gasto'+(filtrados.length!==1?"s":"")+(histBusqueda?" encontrado"+(filtrados.length!==1?"s":""):"")+'</div>'+
      '<div style="font-size:16px;font-weight:900;color:var(--uc)">'+fmt(totalHist)+'</div>'+
    '</div></div>';

  if(!filtrados.length){
    return searchBar+'<div class="empty"><div style="font-size:48px">'+(histBusqueda?"🔍":"📭")+'</div>'+
      '<div style="font-size:14px;font-weight:600;margin-top:10px">'+(histBusqueda?'Sin resultados para "'+histBusqueda+'"':"Sin gastos aún")+'</div></div>';
  }

  var kH=keyI(iniSem(dI,0));
  return searchBar+sems.map(function(e){
    var k=e[0],ini=e[1].ini,gs=e[1].gastos,fin=finSem(ini);
    var tot=gs.reduce(function(s,g){return s+g.monto;},0);
    var mT=gs.filter(function(g){return g.usuario==="manolo";}).reduce(function(s,g){return s+g.monto;},0);
    var eT=gs.filter(function(g){return g.usuario==="esposa";}).reduce(function(s,g){return s+g.monto;},0);
    return '<div class="semb">'+
      '<div style="font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">'+
        '<span>'+(k===kH?"📅 Esta semana":fmtR(ini,fin))+'</span>'+
        '<div style="display:flex;gap:6px;align-items:center">'+
          '<span style="font-size:12px;background:#e2e8f0;padding:3px 8px;border-radius:50px;color:#64748b">'+fmt(tot)+'</span>'+
          '<span style="font-size:11px;color:#94a3b8">'+gs.length+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="semmini">'+
        '<div class="semminicard" style="background:#EFF6FF"><div style="font-size:11px;color:#64748b">'+p.manolo.emoji+' '+p.manolo.nombre+'</div><div style="font-size:16px;font-weight:900;color:#2563EB">'+fmt(mT)+'</div></div>'+
        '<div class="semminicard" style="background:#FDF2F8"><div style="font-size:11px;color:#64748b">'+p.esposa.emoji+' '+p.esposa.nombre+'</div><div style="font-size:16px;font-weight:900;color:#DB2777">'+fmt(eT)+'</div></div>'+
      '</div>'+
      gs.map(gcardH).join("")+
    '</div><hr style="border:none;border-top:1px solid #e2e8f0;margin:0 0 16px"/>';
  }).join("");
}

// ── OCR ──
function triggerOCR(){
  var input=document.getElementById("ocrin");
  input.onchange=async function(e){
    var file=e.target.files[0];if(!file)return;
    ocrLoading=true;renderApp();
    try{
      var b64=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(",")[1]);};r.onerror=rej;r.readAsDataURL(file);});
      var resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,
          messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:"Extrae el monto TOTAL de este ticket. Solo el número, sin símbolo. Si no hay, responde 0."}]}]})});
      var data=await resp.json();
      var monto=parseFloat(((data.content&&data.content[0]&&data.content[0].text)||"0").replace(/[^0-9.]/g,""));
      ocrLoading=false;renderApp();
      if(monto>0){setTimeout(function(){var inp=document.getElementById("im");if(inp){inp.value=monto;chkF();toast("📷 "+fmt(monto),"#10b981");}},100);}
      else toast("No se detectó monto","#f59e0b");
    }catch(err){ocrLoading=false;renderApp();toast("Error","#ef4444");}
    input.value="";};
  input.click();
}

// ── EXPORT CSV ──
function exportarCSV(){
  var todos=Object.values(ST.gastos||{}).sort(function(a,b){return new Date(a.fecha)-new Date(b.fecha);});
  if(!todos.length){toast("Sin gastos para exportar","#f59e0b");return;}
  var p=ST.perfiles;
  var rows=[["Fecha","Descripcion","Monto","Categoria","Usuario","Split","Nota","Invitacion"]];
  todos.forEach(function(g){
    var c=CATS.find(function(x){return x.id===g.categoria;})||{l:g.categoria||"otro"};
    rows.push([new Date(g.fecha).toLocaleDateString("es-MX"),
      (g.descripcion||"").replace(/,/g,";"),g.monto,c.l,
      (p[g.usuario]||{nombre:g.usuario}).nombre,
      g.split?"Si":"No",(g.nota||"").replace(/,/g,";"),g.invitacion?"Si":"No"]);
  });
  var csv=rows.map(function(r){return r.join(",");}).join("\n");
  var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download="gastos-pareja.csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast("📥 CSV descargado","#10b981");
}

function toast(msg,color){color=color||"#10b981";var el=document.getElementById("toast");if(!el)return;el.textContent=msg;el.style.background=color;el.classList.add("show");setTimeout(function(){el.classList.remove("show");},2500);}

</script>
