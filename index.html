<style>

.pesv{margin-top:6px;border:none;border-radius:10px;padding:7px 14px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;color:#fff;touch-action:manipulation;}
.dg{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px;}
.db{padding:8px 2px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;cursor:pointer;font-size:11px;font-weight:700;color:#64748b;font-family:inherit;touch-action:manipulation;}
.db.on{border-color:var(--uc);background:var(--ul);color:var(--uc);}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;}

.eo.sel{border-color:var(--uc);background:var(--ul);}
.moc{width:100%;margin-top:16px;padding:13px;background:#f1f5f9;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;touch-action:manipulation;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);color:#fff;padding:11px 22px;border-radius:50px;font-size:14px;font-weight:700;z-index:999;box-shadow:0 6px 24px rgba(0,0,0,.2);white-space:nowrap;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:48px 0;color:#94a3b8;}
.recitem{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #e2e8f0;}
.recitem:last-child{border-bottom:none;}
</style>

<body>

<!-- LOGIN: en el HTML estático, sin esperar JS ni Firebase -->
<div id="app">
  <div id="login">
    <div style="font-size:64px;line-height:1">💑</div>
    <div class="ltitle">Gastos Pareja</div>
    <div class="lsub">¿Quién va a registrar?</div>
    <div class="lcards">
      <button class="lc" id="bm" style="border-color:#2563EB">
        <span class="e">👨</span>
        <span style="color:#2563EB">Manolo</span>
      </button>
      <button class="lc" id="be" style="border-color:#DB2777">
        <span class="e">👩</span>
        <span style="color:#DB2777">Esposa</span>
      </button>
    </div>
    <div id="spin" style="display:none"><div class="spin"></div><span>Cargando datos...</span></div>
    <div class="lhint">📱 Sincronizado en tiempo real</div>
  </div>
</div>
<div id="toast"></div>
<input type="file" id="ocrin" accept="image/*" capture="environment"/>

<script>
// Botones activos INMEDIATAMENTE, sin esperar Firebase
document.getElementById("bm").addEventListener("click", function(){ elegir("manolo"); });
document.getElementById("be").addEventListener("click", function(){ elegir("esposa"); });
// Extra: touchend para iOS
document.getElementById("bm").addEventListener("touchend", function(e){ e.preventDefault(); elegir("manolo"); });
document.getElementById("be").addEventListener("touchend", function(e){ e.preventDefault(); elegir("esposa"); });

var usuarioSeleccionado = null;

function elegir(k) {
  if(usuarioSeleccionado) return; // evitar doble tap
  usuarioSeleccionado = k;
  // Mostrar spinner
  document.getElementById("bm").disabled = true;
  document.getElementById("be").disabled = true;
  document.getElementById("spin").style.display = "flex";
  // Ahora sí inicializar Firebase y cargar datos
  iniciarFirebase(k);
}

// ─── FIREBASE (se inicia DESPUÉS de elegir usuario) ───
var FC = {
  apiKey:"AIzaSyAx0ILxze_MTBEoElQSvJEjHwaHjC9Uqkg",
  authDomain:"gastos-7adfd.firebaseapp.com",
  databaseURL:"https://gastos-7adfd-default-rtdb.firebaseio.com",
  projectId:"gastos-7adfd",
  storageBucket:"gastos-7adfd.firebasestorage.app",
  messagingSenderId:"562517695534",
  appId:"1:562517695534:web:ce38c380a7bce4215293bf"
};
var db = null;

function iniciarFirebase(k) {
  firebase.initializeApp(FC);
  db = firebase.database();
  db.ref("gastos-pareja").once("value", function(snap) {
    if(snap.exists()) {
      var v = snap.val();
      if(v.settings) ST.settings = Object.assign({}, ST.settings, v.settings);
      if(v.perfiles) ST.perfiles = v.perfiles;
      if(v.finanzas) ST.finanzas = v.finanzas;
      ST.gastos = v.gastos || {};
      ST.rollovers = v.rollovers || {};
      ST.ultimaSemana = v.ultimaSemana || null;
      ST.ultimoMes = v.ultimoMes || null;
      ST.resumenesMensuales = v.resumenesMensuales || {};
    }
    // Actualizar nombres y emojis en los botones según lo guardado
    usuario = k;
    var col = k==="manolo" ? "#2563EB" : "#DB2777";
    var light = k==="manolo" ? "#EFF6FF" : "#FDF2F8";
    document.documentElement.style.setProperty("--uc", col);
    document.documentElement.style.setProperty("--ul", light);
    checkSemana();
    checkMes();
    renderApp();
    // Ahora sí suscribir al listener para updates en tiempo real
    db.ref("gastos-pareja").on("value", function(snap2) {
      if(!fbGuard) {
        if(snap2.exists()) {
          var v2 = snap2.val();
          if(v2.settings) ST.settings = Object.assign({}, ST.settings, v2.settings);
          if(v2.perfiles) ST.perfiles = v2.perfiles;
          if(v2.finanzas) ST.finanzas = v2.finanzas;
          ST.gastos = v2.gastos || {};
          ST.rollovers = v2.rollovers || {};
          ST.resumenesMensuales = v2.resumenesMensuales || {};
        }
        renderApp();
      }
    });
  });
}

// ─── CONSTANTES ───
var EMOJIS = {
  manolo:["👨","🧔","👦","👨‍💼","🧑","🤠","😎","🥷","👻","🐻","🦁","🐯","🐸","🎮","🚀","⚡"],
  esposa:["👩","👧","👩‍💼","👩‍🦱","💁‍♀️","🧖‍♀️","🌸","🦋","🐱","🌺","👸","🧚‍♀️","🦄","🌙","💅","🎀"]
};
var COL = {manolo:"#2563EB", esposa:"#DB2777"};
var CATS = [
  {id:"super",l:"Súper",i:"🛒",c:"#3b82f6"},{id:"renta",l:"Renta",i:"🏠",c:"#8b5cf6"},
  {id:"comida",l:"Comida",i:"🍽️",c:"#f59e0b"},{id:"trans",l:"Transporte",i:"🚗",c:"#10b981"},
  {id:"salud",l:"Salud",i:"💊",c:"#ef4444"},{id:"ocio",l:"Ocio",i:"🎉",c:"#ec4899"},
  {id:"ropa",l:"Ropa",i:"👕",c:"#f97316"},{id:"otro",l:"Otro",i:"📦",c:"#94a3b8"}
];
var DIAS = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
var MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var AJS = [100,200,500,1000];

function fmt(n){ return new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",minimumFractionDigits:0}).format(n); }
function fmtD(iso){ return new Date(iso).toLocaleDateString("es-MX",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}); }
function fmtR(a,b){ return a.toLocaleDateString("es-MX",{day:"2-digit",month:"short"})+" – "+b.toLocaleDateString("es-MX",{day:"2-digit",month:"short"}); }
function iniSem(dI,off){off=off||0;var h=new Date();var d=h.getDay()-dI;if(d<0)d+=7;var i=new Date(h);i.setDate(h.getDate()-d-(off*7));i.setHours(0,0,0,0);return i;}
function finSem(i){var f=new Date(i);f.setDate(i.getDate()+6);f.setHours(23,59,59,999);return f;}
function keyI(i){return i.toISOString().split("T")[0];}
function mesKey(){var h=new Date();return h.getFullYear()+"-"+String(h.getMonth()+1).padStart(2,"0");}
function semsEnMes(y,m){return Math.ceil(new Date(y,m+1,0).getDate()/7);}

// ─── STATE ───
var ST = {
  settings:{presupuesto:4000,semanaInicia:4,metaAhorro:0,notifActivas:false},
  perfiles:{manolo:{nombre:"Manolo",emoji:"👨"},esposa:{nombre:"Esposa",emoji:"👩"}},
  finanzas:{ingresoMensual:0,gastosRecurrentes:[]},
  gastos:{},rollovers:{},
  ultimaSemana:null,ultimoMes:null,resumenesMensuales:{}
};
var usuario=null,vista="home",ajuste=100,cat="super",emojiFor=null;
var saving=false,splitActivo=false,ocrLoading=false,mesOffset=0;
var chartCat=null,chartMes=null,generandoResumen=false;
var esSemNueva=false,rolloverVal=0;
var fbGuard=false;

function saveDB(){
  fbGuard=true;
  return db.ref("gastos-pareja").set(ST).then(function(){
    setTimeout(function(){fbGuard=false;},2000);
  });
}

// ─── CHECK SEMANA ───
function checkSemana(){
  var dI=ST.settings.semanaInicia||4;
  var kHoy=keyI(iniSem(dI,0));
  esSemNueva=false;rolloverVal=0;
  if(ST.ultimaSemana && ST.ultimaSemana!==kHoy){
    esSemNueva=true;
    var iAnt=iniSem(dI,1),fAnt=finSem(iAnt),kAnt=keyI(iAnt);
    var gastAnt=Object.values(ST.gastos||{})
      .filter(function(g){var f=new Date(g.fecha);return f>=iAnt&&f<=fAnt;})
      .reduce(function(s,g){return s+g.monto;},0);
    var sob=(ST.settings.presupuesto||4000)+(ST.rollovers[kAnt]||0)-gastAnt;
    if(sob>0&&!ST.rollovers[kHoy]){rolloverVal=Math.round(sob);ST.rollovers[kHoy]=rolloverVal;}
  }
  if(kHoy!==ST.ultimaSemana){ST.ultimaSemana=kHoy;}
}

function checkMes(){

}

// ─── RESUMEN IA ───
async function generarResumen(mStr){
  if(generandoResumen||!db)return;
  generandoResumen=true;
  var todos=Object.values(ST.gastos||{});
  var del=todos.filter(function(g){return g.fecha.startsWith(mStr);});
  if(!del.length){generandoResumen=false;return;}
  var tot=del.reduce(function(s,g){return s+g.monto;},0);
  var mT=del.filter(function(g){return g.usuario==="manolo";}).reduce(function(s,g){return s+g.monto;},0);
  var eT=del.filter(function(g){return g.usuario==="esposa";}).reduce(function(s,g){return s+g.monto;},0);
  var cm={};del.forEach(function(g){cm[g.categoria]=(cm[g.categoria]||0)+g.monto;});
  var top=Object.entries(cm).sort(function(a,b){return b[1]-a[1];}).slice(0,3)
    .map(function(e){return (CATS.find(function(c){return c.id===e[0];})||{l:e[0]}).l+": "+fmt(e[1]);}).join(", ");
  var pts=mStr.split("-");var p=ST.perfiles;
  try{
    var r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,
        messages:[{role:"user",content:"Eres asesor financiero para una pareja mexicana. Resumen de "+MESES[parseInt(pts[1])-1]+" "+pts[0]+". Máximo 5 líneas, tono cálido, emojis, sin markdown.\n\nDatos:\n- Total: "+fmt(tot)+"\n- "+p.manolo.nombre+": "+fmt(mT)+" | "+p.esposa.nombre+": "+fmt(eT)+"\n- Top: "+top}]})
    });
    var data=await r.json();
    var texto=(data.content&&data.content[0]&&data.content[0].text)||"";
    if(texto){
      if(!ST.resumenesMensuales)ST.resumenesMensuales={};
      ST.resumenesMensuales[mStr]={texto:texto,totalMes:tot,mT:mT,eT:eT};
      await saveDB();
    }
  }catch(e){console.error(e);}
  generandoResumen=false;
}

function pedirNotif(){
  if(!("Notification"in window)){toast("No soportado","#ef4444");return;}
  Notification.requestPermission().then(function(p){

    else toast("Permiso denegado","#ef4444");

function calcPres(){
  var f=ST.finanzas;if(!f.ingresoMensual)return null;
  var rec=(f.gastosRecurrentes||[]).reduce(function(s,r){return s+r.monto;},0);
  var disp=f.ingresoMensual-rec;
  var h=new Date();var sems=semsEnMes(h.getFullYear(),h.getMonth());
  return{disp:disp,rec:rec,porSem:Math.round(disp/sems),sems:sems};
}

// ─── VISTAS ───
function buildVista(sem,todos,pres,tot,disp,roll){
  if(vista==="home")return bHome(sem,pres,tot,disp,roll);
  if(vista==="agregar")return bAgregar();
  if(vista==="historial")return bHistorial(todos);
  if(vista==="analisis")return bAnalisis(todos);

  if(vista==="config")return bConfig();

}

  var sems=Object.entries(mp).sort(function(a,b){return new Date(b[0])-new Date(a[0]);});
  if(!sems.length)return'<div class="empty"><div style="font-size:48px">📭</div><div style="font-size:14px;font-weight:600;margin-top:10px">Sin gastos aún</div></div>';

        '<div class="semminicard" style="background:#FDF2F8"><div style="font-size:11px;color:#64748b">'+p.esposa.emoji+' '+p.esposa.nombre+'</div><div style="font-size:16px;font-weight:900;color:#DB2777">'+fmt(eT)+'</div></div>'+

    '</div><hr style="border:none;border-top:1px solid #e2e8f0;margin:0 0 16px"/>';}).join("");}

function bAnalisis(todos){
  var h=new Date(),anio=new Date(h.getFullYear(),h.getMonth()-mesOffset,1);
  var mStr=anio.getFullYear()+"-"+String(anio.getMonth()+1).padStart(2,"0");
  var del=todos.filter(function(g){return g.fecha.startsWith(mStr);});
  var tot=del.reduce(function(s,g){return s+g.monto;},0);
  var mT=del.filter(function(g){return g.usuario==="manolo";}).reduce(function(s,g){return s+g.monto;},0);
  var eT=del.filter(function(g){return g.usuario==="esposa";}).reduce(function(s,g){return s+g.monto;},0);
  var catT=CATS.map(function(c){return Object.assign({},c,{total:del.filter(function(g){return g.categoria===c.id;}).reduce(function(s,g){return s+g.monto;},0)});}).filter(function(c){return c.total>0;}).sort(function(a,b){return b.total-a.total;});
  var p=ST.perfiles,ri=ST.resumenesMensuales?.[mStr];
  return '<div class="msel">'+
    '<button class="msb" data-o="'+(mesOffset+1)+'">◀</button>'+
    '<div style="flex:1;text-align:center;font-size:14px;font-weight:700;">'+MESES[anio.getMonth()]+' '+anio.getFullYear()+'</div>'+
    '<button class="msb" data-o="'+Math.max(0,mesOffset-1)+'"'+(mesOffset===0?" disabled style='opacity:.4'":"")+'>▶</button></div>'+
    '<div class="chcard"><div class="chtitle">💰 Resumen</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center">'+
        '<div style="background:#f8fafc;border-radius:12px;padding:12px"><div style="font-size:11px;color:#64748b">Total</div><div style="font-size:18px;font-weight:900">'+fmt(tot)+'</div></div>'+
        '<div style="background:#EFF6FF;border-radius:12px;padding:12px"><div style="font-size:11px;color:#64748b">'+p.manolo.emoji+'</div><div style="font-size:18px;font-weight:900;color:#2563EB">'+fmt(mT)+'</div></div>'+
        '<div style="background:#FDF2F8;border-radius:12px;padding:12px"><div style="font-size:11px;color:#64748b">'+p.esposa.emoji+'</div><div style="font-size:18px;font-weight:900;color:#DB2777">'+fmt(eT)+'</div></div>'+
      '</div></div>'+
    (catT.length>0?'<div class="chcard"><div class="chtitle">🍕 Categorías</div><div style="height:200px"><canvas id="chartCat"></canvas></div></div>':"")+ 
    '<div class="chcard"><div class="chtitle">📅 Últimos 6 meses</div><div style="height:200px"><canvas id="chartMes"></canvas></div></div>'+
    (ri?'<div class="riai"><div class="riah"><div style="font-size:15px;font-weight:900;color:#fff">🤖 Resumen IA</div></div>'+
      '<div class="riab"><div style="font-size:14px;line-height:1.8;color:#374151;white-space:pre-wrap">'+ri.texto+'</div></div></div>':
      (mesOffset>0?'<button id="btn-gen" data-mes="'+mStr+'" style="width:100%;padding:12px;background:var(--uc);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;">🤖 Generar resumen IA</button>':""));}

function renderCharts(todos){
  var h=new Date(),anio=new Date(h.getFullYear(),h.getMonth()-mesOffset,1);
  var mStr=anio.getFullYear()+"-"+String(anio.getMonth()+1).padStart(2,"0");
  var del=todos.filter(function(g){return g.fecha.startsWith(mStr);});
  var catT=CATS.map(function(c){return Object.assign({},c,{total:del.filter(function(g){return g.categoria===c.id;}).reduce(function(s,g){return s+g.monto;},0)});}).filter(function(c){return c.total>0;});
  var c1=document.getElementById("chartCat");
  if(c1&&catT.length){try{chartCat=new Chart(c1,{type:"doughnut",data:{labels:catT.map(function(c){return c.l;}),datasets:[{data:catT.map(function(c){return c.total;}),backgroundColor:catT.map(function(c){return c.c;}),borderWidth:2,borderColor:"#fff"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},cutout:"65%"}});}catch(e){}}
  var m6=Array.from({length:6},function(_,i){var m=new Date(h.getFullYear(),h.getMonth()-i,1);var s=m.getFullYear()+"-"+String(m.getMonth()+1).padStart(2,"0");
    return{nom:MESES[m.getMonth()].substring(0,3),manolo:todos.filter(function(g){return g.fecha.startsWith(s)&&g.usuario==="manolo";}).reduce(function(s2,g){return s2+g.monto;},0),esposa:todos.filter(function(g){return g.fecha.startsWith(s)&&g.usuario==="esposa";}).reduce(function(s2,g){return s2+g.monto;},0)};}).reverse();
  var c2=document.getElementById("chartMes");
  if(c2){try{chartMes=new Chart(c2,{type:"bar",data:{labels:m6.map(function(m){return m.nom;}),datasets:[{label:ST.perfiles.manolo.nombre,data:m6.map(function(m){return m.manolo;}),backgroundColor:"#93c5fd",borderRadius:6},{label:ST.perfiles.esposa.nombre,data:m6.map(function(m){return m.esposa;}),backgroundColor:"#f9a8d4",borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom"}},scales:{y:{ticks:{callback:function(v){return "$"+v.toLocaleString();}}}}}});}catch(e){}}
}

function bFinanzas(){
  var f=ST.finanzas,calc=calcPres(),recs=f.gastosRecurrentes||[];
  var ress=Object.entries(ST.resumenesMensuales||{}).sort(function(a,b){return b[0].localeCompare(a[0]);});
  return '<div class="fincard"><div class="fintitle">🧮 Calculadora</div>'+
    '<div style="font-size:12px;color:#64748b;margin-bottom:14px;">Ingresa tus ingresos y gastos fijos para calcular cuánto puedes gastar por semana.</div>'+
    '<label class="flbl">Ingreso mensual combinado</label>'+
    '<input type="number" inputmode="decimal" id="inp-ingreso" placeholder="Ej. 25000" value="'+(f.ingresoMensual||"")+'"/>'+
    '<div style="margin:14px 0 8px;display:flex;justify-content:space-between;align-items:center">'+
      '<label class="flbl" style="margin:0">Gastos fijos</label>'+
      '<button id="btn-add-rec" style="background:var(--uc);color:#fff;border:none;border-radius:10px;padding:5px 12px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;touch-action:manipulation">+ Agregar</button>'+
    '</div>'+
    (recs.length===0?'<div style="text-align:center;padding:12px;color:#94a3b8;font-size:13px">Sin gastos fijos todavía.</div>':"")+ 
    recs.map(function(r,i){return '<div class="recitem"><div style="font-size:14px;font-weight:700">'+r.nombre+'</div>'+
      '<div style="display:flex;align-items:center;gap:8px"><div style="font-size:14px;font-weight:800;color:#ef4444">− '+fmt(r.monto)+'</div>'+
      '<button class="btn-del-rec" data-i="'+i+'" style="background:#fee2e2;border:none;border-radius:8px;padding:4px 8px;cursor:pointer;font-size:14px;touch-action:manipulation">🗑️</button></div></div>';}).join("")+
    '<button id="btn-save-fin" style="width:100%;margin-top:14px;padding:12px;background:var(--uc);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;touch-action:manipulation">💾 Guardar y calcular</button></div>'+
    (calc?'<div class="brcard"><div style="font-size:12px;color:#3b82f6;font-weight:700;text-transform:uppercase;letter-spacing:1px;">Presupuesto semanal</div>'+
      '<div class="brmonto">'+fmt(calc.porSem)+'</div>'+
      '<div style="font-size:13px;color:#3b82f6">Por semana · '+calc.sems+' semanas este mes</div>'+
      '<div class="brdet">'+
        '<div class="brd"><div style="font-size:11px;color:#64748b">Ingreso</div><div style="font-size:15px;font-weight:800">'+fmt(f.ingresoMensual)+'</div></div>'+
        '<div class="brd"><div style="font-size:11px;color:#64748b">Fijos</div><div style="font-size:15px;font-weight:800;color:#ef4444">− '+fmt(calc.rec)+'</div></div>'+
        '<div class="brd"><div style="font-size:11px;color:#64748b">Disponible</div><div style="font-size:15px;font-weight:800;color:#16a34a">'+fmt(calc.disp)+'</div></div>'+
        '<div class="brd"><div style="font-size:11px;color:#64748b">Por semana</div><div style="font-size:15px;font-weight:800;color:#1d4ed8">'+fmt(calc.porSem)+'</div></div>'+
      '</div>'+
      '<button id="btn-apply-pres" data-v="'+calc.porSem+'" style="width:100%;margin-top:14px;padding:12px;background:#1d4ed8;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;touch-action:manipulation">✅ Aplicar como presupuesto</button></div>':"")+
    '<div class="fincard"><div class="fintitle">🤖 Resúmenes IA</div>'+
      (ress.length===0?'<div style="text-align:center;padding:14px;color:#94a3b8;font-size:13px">Aparecerán al cerrar cada mes.</div>':"")+
      ress.map(function(e){var k=e[0],r=e[1],pts=k.split("-");
        return '<div style="padding:14px 0;border-bottom:1px solid #e2e8f0">'+
          '<div style="display:flex;justify-content:space-between;margin-bottom:6px">'+
            '<div style="font-size:14px;font-weight:800">'+MESES[parseInt(pts[1])-1]+' '+pts[0]+'</div>'+
            '<div style="font-size:13px;font-weight:800;color:var(--uc)">'+fmt(r.totalMes)+'</div></div>'+
          '<div style="font-size:13px;line-height:1.7;color:#374151;white-space:pre-wrap">'+r.texto+'</div></div>';}).join("")+'</div>';}

function bConfig(){
  var p=ST.perfiles,dI=ST.settings.semanaInicia||4;
  return '<div class="ss"><div class="sst">👤 Perfiles</div><div class="scard">'+
    ["manolo","esposa"].map(function(k){return '<div class="pe">'+
      '<button class="peeb" data-k="'+k+'">'+p[k].emoji+'<br><span style="font-size:9px">✏️</span></button>'+
      '<div style="flex:1"><div style="font-size:11px;font-weight:800;color:'+COL[k]+';text-transform:uppercase;margin-bottom:6px">'+k+'</div>'+
      '<input class="peni" id="pn-'+k+'" value="'+p[k].nombre+'"/>'+
      '<button class="pesv" data-k="'+k+'" style="background:'+COL[k]+'">Guardar ✓</button></div></div>';}).join("")+'</div></div>'+
  '<div class="ss"><div class="sst">📅 Inicio de semana</div><div class="scard">'+
    '<p style="font-size:13px;color:#64748b">Actualmente: <strong>'+DIAS[dI]+'</strong></p>'+
    '<div class="dg">'+DIAS.map(function(d,i){return '<button class="db'+(i===dI?" on":"")+'" data-i="'+i+'">'+d+'</button>';}).join("")+'</div></div></div>'+
  '<div class="ss"><div class="sst">🎯 Meta de ahorro</div><div class="scard">'+
    '<input type="number" id="inp-meta" value="'+(ST.settings.metaAhorro||"")+'" placeholder="Ej. 500" inputmode="decimal"/>'+
    '<button id="btn-save-meta" class="bprimary" style="background:var(--uc)">Guardar meta 🎯</button></div></div>'+
  '<div class="ss"><div class="sst">🔔 Notificaciones</div><div class="scard">'+
    (!("Notification"in window)?'<p style="font-size:13px;color:#64748b">No soportado.</p>':
      ST.settings.notifActivas?'<p style="font-size:13px;color:#16a34a;font-weight:700">✅ Activas</p>':
      '<button id="btn-notif" class="bprimary" style="background:#f59e0b">🔔 Activar notificaciones</button>')+'</div></div>';}

function renderModal(){
  var k=emojiFor,emojis=EMOJIS[k]||[],act=ST.perfiles[k].emoji;
  return '<div id="mo" class="mo">'+
    '<div class="mobox"><div style="font-size:16px;font-weight:800;margin-bottom:16px">Avatar para '+ST.perfiles[k].nombre+'</div>'+
    '<div class="eg">'+emojis.map(function(e){return '<button class="eo'+(e===act?" sel":"")+'" data-e="'+e+'">'+e+'</button>';}).join("")+'</div>'+
    '<button id="modal-close" class="moc">Cerrar</button></div></div>';}

function triggerOCR(){
  var input=document.getElementById("ocrin");
  input.onchange=async function(e){
    var file=e.target.files[0];if(!file)return;
    ocrLoading=true;renderApp();
    try{
      var b64=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(",")[1]);};r.onerror=rej;r.readAsDataURL(file);});
      var resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,
          messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},
            {type:"text",text:"Extrae el monto TOTAL de este ticket. Solo el número, sin símbolo. Si no hay, responde 0."}]}]})});
      var data=await resp.json();
      var monto=parseFloat(((data.content&&data.content[0]&&data.content[0].text)||"0").replace(/[^0-9.]/g,""));
      ocrLoading=false;renderApp();
      if(monto>0){setTimeout(function(){var inp=document.getElementById("im");if(inp){inp.value=monto;chkF();toast("📷 "+fmt(monto),"#10b981");}},100);}
      else toast("No se detectó monto","#f59e0b");
    }catch(err){ocrLoading=false;renderApp();toast("Error","#ef4444");}
    input.value="";};
  input.click();}

function camPres(d){ST.settings.presupuesto=Math.max(0,(ST.settings.presupuesto||4000)+d);saveDB();toast((d>0?"➕":"➖")+" "+fmt(ST.settings.presupuesto),d>0?"#10b981":"#f59e0b");renderApp();}
function addRec(){var n=prompt("Nombre del gasto fijo:");if(!n)return;var m=parseFloat(prompt("Monto mensual de "+n+":"));if(!m||m<=0)return;if(!ST.finanzas.gastosRecurrentes)ST.finanzas.gastosRecurrentes=[];ST.finanzas.gastosRecurrentes.push({nombre:n,monto:m});saveDB();renderApp();}
function delRec(i){ST.finanzas.gastosRecurrentes.splice(i,1);saveDB();renderApp();}
function saveFinanzas(){var v=parseFloat(document.getElementById("inp-ingreso")?.value)||0;ST.finanzas.ingresoMensual=v;saveDB();toast("💾 Guardado");renderApp();}
function aplicarPres(m){ST.settings.presupuesto=m;saveDB();toast("✅ Presupuesto: "+fmt(m));renderApp();}
function setDia(i){ST.settings.semanaInicia=i;saveDB();toast("📅 Semana inicia el "+DIAS[i]);renderApp();}
function savePerfil(k){var n=document.getElementById("pn-"+k)?.value?.trim();if(!n)return;ST.perfiles[k].nombre=n;saveDB();toast("✅ "+n);renderApp();}
function saveMeta(){var v=parseFloat(document.getElementById("inp-meta")?.value)||0;ST.settings.metaAhorro=v;saveDB();toast(v>0?"🎯 Meta: "+fmt(v):"Meta eliminada");renderApp();}
function selEmoji(k,e){ST.perfiles[k].emoji=e;saveDB();emojiFor=null;toast("✅ Avatar actualizado");renderApp();}
function generarResumenManual(mes){toast("🤖 Generando...","#8b5cf6");generarResumen(mes).then(function(){renderApp();});}

function toast(msg,color){color=color||"#10b981";var el=document.getElementById("toast");if(!el)return;el.textContent=msg;el.style.background=color;el.classList.add("show");setTimeout(function(){el.classList.remove("show");},2500);}
</script>
